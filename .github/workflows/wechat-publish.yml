name: 发布微信公众号文章

on:
  workflow_dispatch:
    inputs:
      media_id:
        description: '草稿 media_id（从同步日志或 .wechat-sync.json 里复制）'
        required: true

jobs:
  publish:
    runs-on: self-hosted
    steps:
      - name: 发布草稿到公众号
        env:
          WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
          WECHAT_APPSECRET: ${{ secrets.WECHAT_APPSECRET }}
        run: |
          python3 - <<'PYEOF'
          import httpx, json, os, sys

          appid  = os.environ["WECHAT_APPID"]
          secret = os.environ["WECHAT_APPSECRET"]
          media_id = "${{ inputs.media_id }}"

          # 获取 access_token
          r = httpx.get(
              "https://api.weixin.qq.com/cgi-bin/token",
              params={"grant_type": "client_credential", "appid": appid, "secret": secret},
              timeout=15,
          )
          token = r.json().get("access_token")
          if not token:
              print(f"::error::获取 access_token 失败: {r.json()}")
              sys.exit(1)

          # 发布
          resp = httpx.post(
              "https://api.weixin.qq.com/cgi-bin/freepublish/submit",
              params={"access_token": token},
              content=json.dumps({"media_id": media_id}, ensure_ascii=False).encode(),
              headers={"Content-Type": "application/json; charset=utf-8"},
              timeout=15,
          )
          d = resp.json()
          if d.get("errcode", 0) == 0:
              publish_id = d.get("publish_id", "")
              print(f"✅ 发布成功！publish_id={publish_id}")
          else:
              print(f"::error::发布失败: errcode={d.get('errcode')}, errmsg={d.get('errmsg')}")
              sys.exit(1)
          PYEOF
