name: 发布微信公众号文章

on:
  workflow_dispatch:
    inputs:
      media_id:
        description: '草稿 media_id（从同步日志或 .wechat-sync.json 复制）'
        required: true

jobs:
  publish:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        run: |
          PYTHON_BIN="$HOME/.local/bin/python3.11"
          "$PYTHON_BIN" -m venv .venv
          echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Install AIWriter
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[wechat]'

      - name: 写 stub config
        run: |
          mkdir -p .stub-vault/.obsidian
          printf '[vault]\npath = "./.stub-vault"\n\n[wechat]\nauthor = "老铁"\ndefault_digest_chars = 54\n' > config.toml

      - name: 发布
        env:
          WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
          WECHAT_APPSECRET: ${{ secrets.WECHAT_APPSECRET }}
        run: |
          aiwriter wechat-publish -- "${{ inputs.media_id }}"
