name: 同步到微信公众号草稿箱

# 串在「自动填充文章配图」之后，确保图片就位后再同步。
# 也支持手动触发。
on:
  workflow_run:
    workflows: ["自动填充文章配图"]
    types: [completed]
  workflow_dispatch:
    inputs:
      post:
        description: 'post 路径（如 posts/2026-05-21/xxx）；留空则自动检测最近新增文章'
        required: false

jobs:
  sync:
    runs-on: self-hosted
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch || github.ref_name }}
          fetch-depth: 30

      - name: Setup Python
        run: |
          PYTHON_BIN="$HOME/.local/bin/python3.11"
          if [ ! -x "$PYTHON_BIN" ]; then
            echo "::error::$PYTHON_BIN 不存在"
            exit 1
          fi
          "$PYTHON_BIN" -m venv .venv
          echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Install AIWriter
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[wechat]'

      - name: 写 stub config
        run: |
          mkdir -p .stub-vault/.obsidian
          printf '[vault]\npath = "./.stub-vault"\n\n[wechat]\nauthor = "老铁"\ndefault_digest_chars = 54\n' > config.toml

      - name: 同步 + 预览
        env:
          WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
          WECHAT_APPSECRET: ${{ secrets.WECHAT_APPSECRET }}
          WECHAT_PREVIEW_WXNAME: ${{ secrets.WECHAT_PREVIEW_WXNAME }}
          DYLD_LIBRARY_PATH: /opt/homebrew/lib
          DYLD_FALLBACK_LIBRARY_PATH: /opt/homebrew/lib
        run: |
          set -e
          declare -a targets=()

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.post }}" ]; then
            targets+=("${{ inputs.post }}")
          else
            while IFS= read -r f; do
              dir=$(dirname "$f")
              [ -n "$dir" ] && [ ! -f "$dir/.wechat-sync.json" ] && targets+=("$dir")
            done < <(git log --diff-filter=A --name-only --pretty=format: HEAD \
              | grep -E '^posts/.+/article\.html$' | sort -u || true)
          fi

          if [ ${#targets[@]} -eq 0 ]; then
            echo "::notice::没有新文章需要同步"
            exit 0
          fi

          for t in "${targets[@]}"; do
            if [ ! -f "$t/article.html" ]; then
              echo "::warning::$t/article.html 不存在，跳过"
              continue
            fi
            if [ -f "$t/.wechat-sync.json" ]; then
              echo "::notice::$t 已同步过，跳过"
              continue
            fi

            echo "::group::同步 $t"
            aiwriter wechat-sync "$t"
            echo "::endgroup::"

            if [ -f "$t/.wechat-sync.json" ] && [ -n "$WECHAT_PREVIEW_WXNAME" ]; then
              MEDIA_ID=$(python3 -c "import json; print(json.load(open('$t/.wechat-sync.json'))['media_id'])")
              TITLE=$(python3 -c "import json; print(json.load(open('$t/.wechat-sync.json'))['title'])")
              echo "::group::预览推送"
              aiwriter wechat-preview -- "$MEDIA_ID" "$WECHAT_PREVIEW_WXNAME"
              echo "::notice::《$TITLE》预览已发到微信 $WECHAT_PREVIEW_WXNAME | 发布命令: gh workflow run wechat-publish.yml --field media_id=$MEDIA_ID"
              echo "::endgroup::"
            fi
          done

      - name: 提交 sync marker
        run: |
          git config user.name  "AIWriter Bot"
          git config user.email "aiwriter-bot@users.noreply.github.com"
          find posts -name '.wechat-sync.json' -print0 | xargs -0 -r git add
          if git diff --staged --quiet; then
            echo "无 marker 变化"
          else
            git commit -m "auto: 微信草稿同步标记 [skip ci]"
            git push
          fi
