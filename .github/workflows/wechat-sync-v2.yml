name: 同步到微信公众号草稿箱

# 串在「自动填充文章配图」之后，确保图片就位后再同步。
# 也支持手动触发。
on:
  schedule:
    - cron: '25 0 * * *'   # 北京时间每天 08:25（UTC 00:25）
  workflow_run:
    workflows: ["自动填充文章配图"]
    types: [completed]
  workflow_dispatch:
    inputs:
      post:
        description: 'post 路径（如 posts/2026-05-21/xxx）；留空则自动检测最近新增文章'
        required: false
      force:
        description: '强制重发：删除草稿箱已存在的同标题草稿后重新同步'
        required: false
        type: boolean
        default: false

jobs:
  sync:
    runs-on: self-hosted
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch || github.ref_name }}
          fetch-depth: 30

      - name: Setup Python
        run: |
          PYTHON_BIN="$HOME/.local/bin/python3.11"
          if [ ! -x "$PYTHON_BIN" ]; then
            echo "::error::$PYTHON_BIN 不存在"
            exit 1
          fi
          "$PYTHON_BIN" -m venv .venv
          echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Install AIWriter
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[wechat]'

      - name: 写 stub config
        run: |
          mkdir -p .stub-vault/.obsidian
          printf '[vault]\npath = "./.stub-vault"\n\n[wechat]\nauthor = "老铁"\ndefault_digest_chars = 54\n' > config.toml

      - name: 同步 + 预览
        env:
          WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
          WECHAT_APPSECRET: ${{ secrets.WECHAT_APPSECRET }}
          WECHAT_PREVIEW_WXNAME: ${{ secrets.WECHAT_PREVIEW_WXNAME }}
          DYLD_LIBRARY_PATH: /opt/homebrew/lib
          DYLD_FALLBACK_LIBRARY_PATH: /opt/homebrew/lib
        run: |
          # 选文 + 去重 + 同步逻辑全部收敛到 sync_drafts.py：
          #   - 只按目录日期选最近 3 天未同步文章（不再 `git log HEAD` 遍历全史重发老文）
          #   - 同步前实查草稿箱按标题去重，已存在则补标记跳过（绝不重复发放）
          #   - 单篇失败只记 warning 继续，不中断整批（缺封面等不再卡死新文）
          FORCE_FLAG=""
          if [ "${{ inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.post }}" ]; then
            python skills/scripts/sync_drafts.py --post "${{ inputs.post }}" $FORCE_FLAG
          else
            python skills/scripts/sync_drafts.py --recent-days 3
          fi

      - name: 提交 sync marker
        run: |
          git config user.name  "AIWriter Bot"
          git config user.email "aiwriter-bot@users.noreply.github.com"
          find posts -name '.wechat-sync.json' -print0 | xargs -0 -r git add
          if git diff --staged --quiet; then
            echo "无 marker 变化"
            exit 0
          fi
          git commit -m "auto: 微信草稿同步标记 [skip ci]"
          # 应对并发 push 冲突（fill_images / 其他 sync run 抢先 push）：
          # rebase 重试最多 5 次；marker 文件是新增不会冲突
          for i in 1 2 3 4 5; do
            if git push; then
              echo "marker 推送成功（尝试 $i 次）"
              exit 0
            fi
            echo "push 失败，rebase 后重试（第 $i 次）..."
            git pull --rebase origin "${{ github.event.workflow_run.head_branch || github.ref_name }}" || true
            sleep $((i * 2))
          done
          echo "::warning::marker push 经 5 次重试仍失败，下次 sync 会按标题去重补 marker"
          exit 0
