name: 同步到微信公众号草稿箱

# 串在「自动填充文章配图」之后，确保图片就位后再同步。
# 也支持手动触发。
on:
  workflow_run:
    workflows: ["自动填充文章配图"]
    types: [completed]
  workflow_dispatch:
    inputs:
      post:
        description: 'post 路径（如 posts/2026-05-21/xxx）；留空则尝试自动检测最近一次提交新增的文章'
        required: false

jobs:
  sync:
    # 必须用自托管 runner，因为微信 API 要 IP 白名单
    runs-on: self-hosted
    # 仅在触发它的 workflow 成功时跑（手动触发时无此字段，也放行）
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write  # 需要 commit marker

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # workflow_run 触发时拿对应分支的最新代码（含 bot 提交的图片）
          ref: ${{ github.event.workflow_run.head_branch || github.ref_name }}
          fetch-depth: 30

      - name: Setup Python (use local 3.11, self-hosted runner)
        run: |
          # 在 self-hosted runner 上直接用本地 Python 3.11，避免 actions/setup-python 的 /Users/runner 权限问题
          PYTHON_BIN="$HOME/.local/bin/python3.11"
          if [ ! -x "$PYTHON_BIN" ]; then
            echo "::error::$PYTHON_BIN 不存在"
            exit 1
          fi
          # 用 venv 隔离依赖
          "$PYTHON_BIN" -m venv .venv
          echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Install AIWriter (含 wechat 可选依赖)
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[wechat]'

      - name: 写一份 stub config
        run: |
          mkdir -p .stub-vault/.obsidian
          cat > config.toml <<'EOF'
          [vault]
          path = "./.stub-vault"

          [wechat]
          author = "老铁"
          default_digest_chars = 54
          EOF

      - name: 确定要同步的文章 + 执行同步
        env:
          WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
          WECHAT_APPSECRET: ${{ secrets.WECHAT_APPSECRET }}
          WECHAT_PREVIEW_WXNAME: ${{ secrets.WECHAT_PREVIEW_WXNAME }}
          # cairosvg 需要 native libcairo（brew install cairo）
          DYLD_LIBRARY_PATH: /opt/homebrew/lib
          DYLD_FALLBACK_LIBRARY_PATH: /opt/homebrew/lib
        run: |
          set -e

          declare -a targets=()

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.post }}" ]; then
            targets+=("${{ inputs.post }}")
          else
            # 从最近 30 个 commit 里找新增的 article.html，过滤掉已有 marker 的
            # 用 git log 而非单个 commit diff，避免 fill-images auto-commit 的 head_sha 跳过原始提交
            while IFS= read -r f; do
              dir=$(dirname "$f")
              [ -n "$dir" ] && [ ! -f "$dir/.wechat-sync.json" ] && targets+=("$dir")
            done < <(git log --diff-filter=A --name-only --pretty=format: HEAD \
              | grep -E '^posts/.+/article\.html$' | sort -u || true)
          fi

          if [ ${#targets[@]} -eq 0 ]; then
            echo "::notice::没有新文章需要同步"
            exit 0
          fi

          for t in "${targets[@]}"; do
            if [ ! -f "$t/article.html" ]; then
              echo "::warning::$t/article.html 不存在，跳过"
              continue
            fi
            if [ -f "$t/.wechat-sync.json" ]; then
              echo "::notice::$t 已同步过（存在 .wechat-sync.json），跳过；如需重发请删除该文件"
              continue
            fi
            echo "::group::同步 $t"
            aiwriter wechat-sync "$t"
            # 同步成功后推送预览到管理员微信
            if [ -n "$WECHAT_PREVIEW_WXNAME" ] && [ -f "$t/.wechat-sync.json" ]; then
              MEDIA_ID=$(python3 -c "import json,sys; d=json.load(open('$t/.wechat-sync.json')); print(d['media_id'])")
              TITLE=$(python3 -c "import json,sys; d=json.load(open('$t/.wechat-sync.json')); print(d['title'])")
              python3 - <<PYEOF
import httpx, json, os
appid = os.environ["WECHAT_APPID"]
secret = os.environ["WECHAT_APPSECRET"]
wxname = os.environ["WECHAT_PREVIEW_WXNAME"]
media_id = "$MEDIA_ID"
r = httpx.get("https://api.weixin.qq.com/cgi-bin/token", params={"grant_type":"client_credential","appid":appid,"secret":secret}, timeout=15)
token = r.json()["access_token"]
resp = httpx.post("https://api.weixin.qq.com/cgi-bin/draft/preview", params={"access_token":token},
    content=json.dumps({"towxname":wxname,"media_id":media_id},ensure_ascii=False).encode(),
    headers={"Content-Type":"application/json; charset=utf-8"}, timeout=15)
d = resp.json()
if d.get("errcode", 0) == 0:
    print(f"  ✓ 预览已推送到微信: {wxname}")
else:
    print(f"  ⚠ 预览推送失败: {d}")
PYEOF
              echo "::notice::预览已推送到微信 $WECHAT_PREVIEW_WXNAME，media_id=$MEDIA_ID，发布命令：gh workflow run wechat-publish.yml --field media_id=$MEDIA_ID"
            fi
            echo "::endgroup::"
          done

      - name: 提交 sync marker
        run: |
          git config user.name  "AIWriter Bot"
          git config user.email "aiwriter-bot@users.noreply.github.com"
          # 只添加 marker，不动其它文件
          find posts -name '.wechat-sync.json' -print0 | xargs -0 -r git add
          if git diff --staged --quiet; then
            echo "无 marker 变化"
          else
            git commit -m "auto: 微信草稿同步标记 [skip ci]"
            git push
          fi
