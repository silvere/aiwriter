name: 自动填充文章配图

on:
  push:
    branches: [main]
    paths:
      - 'posts/**'          # 有新文章时触发
  workflow_dispatch:        # 也支持手动触发

jobs:
  fill-images:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # 需要写权限来 commit 图片

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装图片生成依赖
        run: pip install --quiet openai python-dotenv matplotlib

      - name: 填充图片占位符
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          OPENAI_IMAGE_MODEL: ${{ vars.OPENAI_IMAGE_MODEL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: python3 skills/scripts/fill_images.py posts/

      - name: 生成 posts.json（加速首页加载）
        run: |
          python3 - <<'EOF'
          import json, re
          from pathlib import Path
          T = re.compile(r'<title>(.*?)</title>', re.I)
          posts = []
          for f in sorted(Path('posts').glob('*/*/article.html'), reverse=True):
              p = f.parts  # ('posts', date, slug, 'article.html')
              m = T.search(f.read_text(encoding='utf-8', errors='ignore'))
              posts.append({'title': m.group(1) if m else p[2], 'date': p[1], 'url': '/'.join(p)})
          Path('posts.json').write_text(json.dumps(posts, ensure_ascii=False), encoding='utf-8')
          print(f'posts.json: {len(posts)} 篇')
          EOF

      - name: Commit 图片和 posts.json
        run: |
          git config user.name  "AIWriter Bot"
          git config user.email "aiwriter-bot@users.noreply.github.com"
          git add posts/ posts.json
          git diff --staged --quiet \
            && echo "无变化" \
            || (git commit -m "auto: 填充配图 + 更新 posts.json [skip ci]" && git push)
