<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eff6ff"/>
    </linearGradient>
    <filter id="shadow4" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#1e3a8a" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg4)"/>

  <!-- Central chat bubble -->
  <g filter="url(#shadow4)">
    <circle cx="400" cy="250" r="92" fill="#1e40af"/>
    <path d="M 358 320 L 348 350 L 378 326 Z" fill="#1e40af"/>
    <text x="400" y="240" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#dbeafe" text-anchor="middle">CHAT</text>
    <text x="400" y="270" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#dbeafe" text-anchor="middle">CONTEXT</text>
  </g>

  <!-- Radial lines + 4 product cards around -->
  <!-- Top -->
  <line x1="400" y1="158" x2="400" y2="100" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="3 3"/>
  <g transform="translate(340, 30)" filter="url(#shadow4)">
    <rect x="0" y="0" width="120" height="70" rx="10" fill="#ffffff" stroke="#fed7aa" stroke-width="2"/>
    <rect x="10" y="10" width="34" height="14" rx="3" fill="#f97316"/>
    <text x="27" y="21" font-family="Helvetica, Arial, sans-serif" font-size="9" font-weight="700" fill="#ffffff" text-anchor="middle">AD</text>
    <rect x="10" y="34" width="80" height="6" rx="3" fill="#cbd5e1"/>
    <rect x="10" y="48" width="60" height="6" rx="3" fill="#cbd5e1"/>
    <circle cx="100" cy="50" r="10" fill="#fb923c"/>
  </g>

  <!-- Right -->
  <line x1="492" y1="250" x2="552" y2="250" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="3 3"/>
  <g transform="translate(560, 215)" filter="url(#shadow4)">
    <rect x="0" y="0" width="120" height="70" rx="10" fill="#ffffff" stroke="#fed7aa" stroke-width="2"/>
    <rect x="10" y="10" width="34" height="14" rx="3" fill="#f97316"/>
    <text x="27" y="21" font-family="Helvetica, Arial, sans-serif" font-size="9" font-weight="700" fill="#ffffff" text-anchor="middle">AD</text>
    <rect x="10" y="34" width="80" height="6" rx="3" fill="#cbd5e1"/>
    <rect x="10" y="48" width="60" height="6" rx="3" fill="#cbd5e1"/>
    <circle cx="100" cy="50" r="10" fill="#fb923c"/>
  </g>

  <!-- Bottom -->
  <line x1="400" y1="342" x2="400" y2="400" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="3 3"/>
  <g transform="translate(340, 400)" filter="url(#shadow4)">
    <rect x="0" y="0" width="120" height="70" rx="10" fill="#ffffff" stroke="#fed7aa" stroke-width="2"/>
    <rect x="10" y="10" width="34" height="14" rx="3" fill="#f97316"/>
    <text x="27" y="21" font-family="Helvetica, Arial, sans-serif" font-size="9" font-weight="700" fill="#ffffff" text-anchor="middle">AD</text>
    <rect x="10" y="34" width="80" height="6" rx="3" fill="#cbd5e1"/>
    <rect x="10" y="48" width="60" height="6" rx="3" fill="#cbd5e1"/>
    <circle cx="100" cy="50" r="10" fill="#fb923c"/>
  </g>

  <!-- Left -->
  <line x1="308" y1="250" x2="248" y2="250" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="3 3"/>
  <g transform="translate(120, 215)" filter="url(#shadow4)">
    <rect x="0" y="0" width="120" height="70" rx="10" fill="#ffffff" stroke="#fed7aa" stroke-width="2"/>
    <rect x="10" y="10" width="34" height="14" rx="3" fill="#f97316"/>
    <text x="27" y="21" font-family="Helvetica, Arial, sans-serif" font-size="9" font-weight="700" fill="#ffffff" text-anchor="middle">AD</text>
    <rect x="10" y="34" width="80" height="6" rx="3" fill="#cbd5e1"/>
    <rect x="10" y="48" width="60" height="6" rx="3" fill="#cbd5e1"/>
    <circle cx="100" cy="50" r="10" fill="#fb923c"/>
  </g>
</svg>
