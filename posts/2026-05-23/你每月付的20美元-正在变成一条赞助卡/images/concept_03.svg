<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eff6ff"/>
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#1e3a8a" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg3)"/>

  <!-- Central fulcrum/pillar -->
  <rect x="395" y="270" width="10" height="140" fill="#1e3a8a"/>
  <polygon points="380,410 420,410 410,430 390,430" fill="#1e3a8a"/>
  <rect x="350" y="430" width="100" height="8" rx="2" fill="#1e3a8a"/>

  <!-- Tilted beam: ad side UP (left), subscription side DOWN (right) - actually reverse: ads up = right rising -->
  <!-- We'll tilt: right side higher (ads rising), left side lower (subscription falling) -->
  <g transform="translate(400, 280) rotate(-15)">
    <rect x="-220" y="-6" width="440" height="12" rx="6" fill="#1e3a8a"/>
  </g>

  <!-- LEFT side (lower) - fading subscription card -->
  <g transform="translate(180, 340)" opacity="0.85" filter="url(#shadow3)">
    <rect x="0" y="0" width="160" height="100" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="80" y="40" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#94a3b8" text-anchor="middle">$20</text>
    <text x="80" y="62" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#94a3b8" text-anchor="middle">SUBSCRIPTION</text>
    <line x1="20" y1="80" x2="140" y2="80" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="80" y="92" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">per month</text>
  </g>
  <!-- Tether to left of beam -->
  <line x1="260" y1="340" x2="195" y2="335" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3 3"/>

  <!-- RIGHT side (higher) - rising stack of coins/ad cards -->
  <g transform="translate(540, 130)" filter="url(#shadow3)">
    <!-- Stacked ad cards -->
    <rect x="20" y="80" width="140" height="40" rx="8" fill="#fed7aa" stroke="#f97316" stroke-width="2"/>
    <rect x="14" y="48" width="140" height="40" rx="8" fill="#fdba74" stroke="#f97316" stroke-width="2"/>
    <rect x="8" y="16" width="140" height="40" rx="8" fill="#fb923c" stroke="#ea580c" stroke-width="2"/>
    <!-- AD tag on top card -->
    <rect x="22" y="22" width="44" height="18" rx="3" fill="#9a3412"/>
    <text x="44" y="36" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">AD</text>
    <rect x="76" y="25" width="60" height="6" rx="3" fill="#ffffff" opacity="0.8"/>
    <rect x="76" y="38" width="40" height="6" rx="3" fill="#ffffff" opacity="0.6"/>
  </g>
  <!-- Tether to right of beam -->
  <line x1="540" y1="225" x2="618" y2="218" stroke="#f97316" stroke-width="1.5" stroke-dasharray="3 3"/>

  <!-- Up/Down arrows -->
  <g transform="translate(620, 90)">
    <polygon points="0,20 10,0 20,20" fill="#f97316"/>
  </g>
  <g transform="translate(180, 460)">
    <polygon points="0,0 10,20 20,0" fill="#94a3b8"/>
  </g>
</svg>
