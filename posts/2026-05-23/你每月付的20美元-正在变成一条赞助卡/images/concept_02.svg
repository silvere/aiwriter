<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eff6ff"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#1e3a8a" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg2)"/>

  <!-- Descending staircase -->
  <g filter="url(#shadow2)">
    <!-- Step 1: tallest -->
    <rect x="120" y="120" width="160" height="300" rx="6" fill="#1e3a8a"/>
    <text x="200" y="105" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" text-anchor="middle">$50,000</text>

    <!-- Step 2: medium -->
    <rect x="280" y="220" width="160" height="200" rx="6" fill="#3b82f6"/>
    <text x="360" y="205" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#1e40af" text-anchor="middle">$10,000</text>

    <!-- Step 3: lowest, ground level -->
    <rect x="440" y="370" width="160" height="50" rx="6" fill="#60a5fa"/>
    <text x="520" y="355" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#1d4ed8" text-anchor="middle">$0</text>
  </g>

  <!-- Storefront on bottom step -->
  <g transform="translate(640, 320)">
    <rect x="0" y="20" width="100" height="55" rx="4" fill="#ffffff" stroke="#1e3a8a" stroke-width="2.5"/>
    <polygon points="0,20 50,0 100,20" fill="#f97316"/>
    <rect x="42" y="40" width="16" height="35" fill="#1e3a8a"/>
    <rect x="12" y="35" width="20" height="20" fill="#dbeafe" stroke="#1e3a8a" stroke-width="1.5"/>
    <rect x="68" y="35" width="20" height="20" fill="#dbeafe" stroke="#1e3a8a" stroke-width="1.5"/>
  </g>

  <!-- Ground line -->
  <line x1="80" y1="430" x2="720" y2="430" stroke="#94a3b8" stroke-width="2"/>

  <!-- Arrow showing direction of fall -->
  <path d="M 80 80 Q 400 80 720 460" stroke="#f97316" stroke-width="3" stroke-dasharray="6 4" fill="none" stroke-linecap="round" opacity="0.55"/>
  <polygon points="720,460 712,448 712,468" fill="#f97316" opacity="0.8"/>
</svg>
