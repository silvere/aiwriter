<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eff6ff"/>
    </linearGradient>
    <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1e3a8a" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg1)"/>

  <!-- AI answer bubble -->
  <g filter="url(#shadow1)">
    <rect x="120" y="80" width="560" height="160" rx="18" fill="#ffffff" stroke="#dbeafe" stroke-width="2"/>
    <circle cx="160" cy="120" r="14" fill="#1e40af"/>
    <text x="186" y="126" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#1e293b">AI</text>
    <rect x="160" y="155" width="420" height="10" rx="5" fill="#cbd5e1"/>
    <rect x="160" y="175" width="480" height="10" rx="5" fill="#cbd5e1"/>
    <rect x="160" y="195" width="380" height="10" rx="5" fill="#cbd5e1"/>
    <rect x="160" y="215" width="220" height="10" rx="5" fill="#cbd5e1"/>
  </g>

  <!-- Connector line -->
  <line x1="400" y1="252" x2="400" y2="280" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4 4"/>

  <!-- Sponsored card -->
  <g filter="url(#shadow1)">
    <rect x="120" y="290" width="560" height="150" rx="14" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
    <!-- Sponsored tag -->
    <rect x="140" y="308" width="92" height="22" rx="4" fill="#f97316"/>
    <text x="186" y="324" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">SPONSORED</text>
    <!-- Product icon (placeholder square) -->
    <rect x="140" y="350" width="70" height="70" rx="10" fill="#fb923c"/>
    <circle cx="175" cy="378" r="10" fill="#ffedd5"/>
    <rect x="160" y="392" width="30" height="6" rx="3" fill="#ffedd5"/>
    <!-- Product info lines -->
    <rect x="230" y="355" width="220" height="10" rx="5" fill="#9a3412"/>
    <rect x="230" y="375" width="160" height="8" rx="4" fill="#c2410c" opacity="0.6"/>
    <!-- Price -->
    <rect x="580" y="355" width="80" height="32" rx="6" fill="#1e3a8a"/>
    <text x="620" y="376" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">$$</text>
    <rect x="230" y="400" width="100" height="8" rx="4" fill="#c2410c" opacity="0.5"/>
  </g>
</svg>
