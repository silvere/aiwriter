<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="chipGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#1A56DB"/>
    </linearGradient>
    <linearGradient id="anthropicGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#F05252"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1A56DB"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#F05252"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="url(#bgGrad)" rx="14"/>

  <!-- 标题 -->
  <text x="400" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">供应商 → 股东：HBM 三巨头跨过那张椅子</text>
  <text x="400" y="62" text-anchor="middle" font-size="12" font-weight="500" fill="#64748b">2026.05.28 Anthropic Series H 投资人结构</text>

  <!-- 上半部分: 主桌 (Anthropic Boardroom) -->
  <!-- 中央圆桌 -->
  <ellipse cx="400" cy="180" rx="160" ry="48" fill="#fff" stroke="#1A56DB" stroke-width="2.5"/>
  <text x="400" y="178" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a8a">Anthropic 股东会</text>
  <text x="400" y="198" text-anchor="middle" font-size="11" font-weight="500" fill="#64748b">$965B post-money</text>

  <!-- 三个椅子 - HBM 三家在主桌旁 -->
  <g>
    <!-- SK 海力士 -->
    <rect x="120" y="155" width="100" height="50" rx="8" fill="url(#chipGrad)"/>
    <text x="170" y="178" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">SK 海力士</text>
    <text x="170" y="194" text-anchor="middle" font-size="10" fill="#cbd5e1">HBM 53%</text>
    <line x1="220" y1="180" x2="248" y2="180" stroke="#1A56DB" stroke-width="2.5" marker-end="url(#arrow)"/>

    <!-- Samsung -->
    <rect x="350" y="80" width="100" height="50" rx="8" fill="url(#chipGrad)"/>
    <text x="400" y="103" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">三星电子</text>
    <text x="400" y="119" text-anchor="middle" font-size="10" fill="#cbd5e1">HBM 35% + Foundry</text>
    <line x1="400" y1="130" x2="400" y2="148" stroke="#1A56DB" stroke-width="2.5" marker-end="url(#arrow)"/>

    <!-- Micron -->
    <rect x="580" y="155" width="100" height="50" rx="8" fill="url(#chipGrad)"/>
    <text x="630" y="178" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">美光 Micron</text>
    <text x="630" y="194" text-anchor="middle" font-size="10" fill="#cbd5e1">HBM 12%</text>
    <line x1="580" y1="180" x2="552" y2="180" stroke="#1A56DB" stroke-width="2.5" marker-end="url(#arrow)"/>
  </g>

  <!-- 标签 -->
  <text x="400" y="240" text-anchor="middle" font-size="12" font-weight="600" fill="#1e3a8a">"strategic infrastructure partners"</text>

  <!-- 下半部分对比: OpenAI -->
  <line x1="60" y1="270" x2="740" y2="270" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>

  <g transform="translate(0, 285)">
    <text x="60" y="14" font-size="13" font-weight="700" fill="#F05252">对比 OpenAI 上一轮（2026.03）：</text>

    <!-- OpenAI 中央 -->
    <rect x="340" y="35" width="120" height="50" rx="8" fill="url(#anthropicGrad)"/>
    <text x="400" y="58" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">OpenAI 股东会</text>
    <text x="400" y="74" text-anchor="middle" font-size="10" fill="#fef9c3">$852B post-money</text>

    <!-- 投资人 -->
    <rect x="120" y="40" width="80" height="40" rx="6" fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="160" y="65" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">Amazon</text>

    <rect x="210" y="40" width="80" height="40" rx="6" fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="250" y="65" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">Nvidia</text>

    <rect x="510" y="40" width="80" height="40" rx="6" fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="550" y="65" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">SoftBank</text>

    <rect x="600" y="40" width="80" height="40" rx="6" fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="640" y="65" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">Microsoft</text>

    <!-- HBM 三家在外面 -->
    <text x="400" y="115" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8" font-style="italic">SK海力士 / 三星 / 美光 ── 不在股东名单</text>
  </g>
</svg>
