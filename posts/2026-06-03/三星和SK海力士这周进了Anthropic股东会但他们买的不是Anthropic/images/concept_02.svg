<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg2Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="navyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0c1e60"/>
    </linearGradient>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#d97706"/>
    </marker>
  </defs>

  <rect width="800" height="380" fill="url(#bg2Grad)" rx="14"/>

  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#1e3a8a">HBM 三家用股权换"下一代规格设计话语权"</text>
  <text x="400" y="60" text-anchor="middle" font-size="12" font-weight="500" fill="#78350f">HBM 4 / 4E / 5 规格在被 Anthropic workload 反向定义</text>

  <!-- 左侧三家供应商 -->
  <g>
    <rect x="50" y="120" width="140" height="44" rx="8" fill="url(#navyGrad)"/>
    <text x="120" y="146" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">SK 海力士</text>

    <rect x="50" y="174" width="140" height="44" rx="8" fill="url(#navyGrad)"/>
    <text x="120" y="200" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">三星电子</text>

    <rect x="50" y="228" width="140" height="44" rx="8" fill="url(#navyGrad)"/>
    <text x="120" y="254" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">美光 Micron</text>
  </g>

  <!-- 中间: 三个箭头汇合 -->
  <g>
    <path d="M 190 142 Q 290 142 320 170" stroke="#d97706" stroke-width="3" fill="none" marker-end="url(#arrowGold)"/>
    <path d="M 190 196 L 320 196" stroke="#d97706" stroke-width="3" fill="none" marker-end="url(#arrowGold)"/>
    <path d="M 190 250 Q 290 250 320 222" stroke="#d97706" stroke-width="3" fill="none" marker-end="url(#arrowGold)"/>

    <!-- 文档蓝图图标 -->
    <text x="260" y="115" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">出钱 / 给设计自由度</text>
  </g>

  <!-- 中央: Anthropic Workload -->
  <g>
    <rect x="320" y="148" width="180" height="96" rx="12" fill="#fff" stroke="#1A56DB" stroke-width="3"/>
    <text x="410" y="178" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Anthropic Workload</text>
    <text x="410" y="200" text-anchor="middle" font-size="11" fill="#475569">AWS Trainium</text>
    <text x="410" y="216" text-anchor="middle" font-size="11" fill="#475569">Google TPU · Azure Maia</text>
    <text x="410" y="232" text-anchor="middle" font-size="11" fill="#475569">SpaceX Colossus</text>
  </g>

  <!-- 右侧: HBM 4 / 5 规格 -->
  <g>
    <path d="M 500 196 L 580 196" stroke="#d97706" stroke-width="3" fill="none" marker-end="url(#arrowGold)"/>

    <rect x="580" y="120" width="170" height="152" rx="12" fill="url(#goldGrad)" opacity="0.95"/>
    <text x="665" y="148" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">下一代 HBM 规格</text>
    <text x="665" y="173" text-anchor="middle" font-size="11" fill="#fef9c3">• 堆栈层数</text>
    <text x="665" y="193" text-anchor="middle" font-size="11" fill="#fef9c3">• I/O 配置</text>
    <text x="665" y="213" text-anchor="middle" font-size="11" fill="#fef9c3">• Base die 逻辑</text>
    <text x="665" y="233" text-anchor="middle" font-size="11" fill="#fef9c3">• 散热曲线</text>
    <text x="665" y="258" text-anchor="middle" font-size="10" font-style="italic" fill="#fff7e6">按 Anthropic 推理需求定</text>
  </g>

  <!-- 底部注释 -->
  <text x="400" y="320" text-anchor="middle" font-size="12" font-weight="600" fill="#1e3a8a">话语权方向：上游 ← 下游</text>
  <text x="400" y="340" text-anchor="middle" font-size="11" fill="#78350f">过去三年由 Nvidia 一家定义 → 5/28 之后 Anthropic 加入定义方</text>
</svg>
