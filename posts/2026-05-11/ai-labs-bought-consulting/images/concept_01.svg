<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="api-glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1A56DB" stop-opacity="0"/>
      <stop offset="50%" stop-color="#60a5fa" stop-opacity="1"/>
      <stop offset="100%" stop-color="#1A56DB" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="spotL" cx="20%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#1A56DB" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1A56DB" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spotR" cx="80%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#F05252" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#F05252" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- bg -->
  <rect width="1200" height="600" fill="url(#bg)"/>
  <rect width="1200" height="600" fill="url(#spotL)"/>
  <rect width="1200" height="600" fill="url(#spotR)"/>

  <!-- grid -->
  <g stroke="#334155" stroke-width="0.5" opacity="0.35">
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="800" y1="0" x2="800" y2="600"/>
    <line x1="1000" y1="0" x2="1000" y2="600"/>
  </g>

  <!-- date pill at top -->
  <g transform="translate(540, 50)">
    <rect width="120" height="32" rx="16" fill="#fef3c7" opacity="0.9"/>
    <text x="60" y="22" font-family="ui-sans-serif, system-ui, -apple-system, Inter" font-size="14" font-weight="700" fill="#78350f" text-anchor="middle">2026 / 05 / 04</text>
  </g>

  <!-- left tower: OpenAI -->
  <g transform="translate(140, 130)">
    <!-- tower body -->
    <rect x="0" y="60" width="220" height="360" rx="10" fill="#1e293b" stroke="#1A56DB" stroke-width="2"/>
    <!-- windows -->
    <g fill="#1A56DB" opacity="0.55">
      <rect x="20"  y="90"  width="30" height="22" rx="2"/>
      <rect x="65"  y="90"  width="30" height="22" rx="2"/>
      <rect x="110" y="90"  width="30" height="22" rx="2"/>
      <rect x="155" y="90"  width="30" height="22" rx="2"/>
      <rect x="20"  y="130" width="30" height="22" rx="2"/>
      <rect x="65"  y="130" width="30" height="22" rx="2" fill="#fbbf24"/>
      <rect x="110" y="130" width="30" height="22" rx="2"/>
      <rect x="155" y="130" width="30" height="22" rx="2"/>
      <rect x="20"  y="170" width="30" height="22" rx="2"/>
      <rect x="65"  y="170" width="30" height="22" rx="2"/>
      <rect x="110" y="170" width="30" height="22" rx="2" fill="#fbbf24"/>
      <rect x="155" y="170" width="30" height="22" rx="2"/>
      <rect x="20"  y="210" width="30" height="22" rx="2"/>
      <rect x="65"  y="210" width="30" height="22" rx="2"/>
      <rect x="110" y="210" width="30" height="22" rx="2"/>
      <rect x="155" y="210" width="30" height="22" rx="2"/>
      <rect x="20"  y="250" width="30" height="22" rx="2" fill="#fbbf24"/>
      <rect x="65"  y="250" width="30" height="22" rx="2"/>
      <rect x="110" y="250" width="30" height="22" rx="2"/>
      <rect x="155" y="250" width="30" height="22" rx="2"/>
      <rect x="20"  y="290" width="30" height="22" rx="2"/>
      <rect x="65"  y="290" width="30" height="22" rx="2"/>
      <rect x="110" y="290" width="30" height="22" rx="2"/>
      <rect x="155" y="290" width="30" height="22" rx="2" fill="#fbbf24"/>
      <rect x="20"  y="330" width="30" height="22" rx="2"/>
      <rect x="65"  y="330" width="30" height="22" rx="2"/>
      <rect x="110" y="330" width="30" height="22" rx="2"/>
      <rect x="155" y="330" width="30" height="22" rx="2"/>
    </g>
    <!-- label plaque -->
    <rect x="0" y="0" width="220" height="50" rx="8" fill="#1A56DB"/>
    <text x="110" y="32" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#fff" text-anchor="middle">OpenAI</text>
    <!-- white flag -->
    <line x1="240" y1="0" x2="240" y2="-70" stroke="#94a3b8" stroke-width="3"/>
    <path d="M240 -70 L310 -55 L240 -40 Z" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
    <text x="305" y="-50" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#475569" text-anchor="middle"></text>
  </g>

  <!-- right tower: Anthropic -->
  <g transform="translate(840, 130)">
    <rect x="0" y="60" width="220" height="360" rx="10" fill="#1e293b" stroke="#F05252" stroke-width="2"/>
    <g fill="#F05252" opacity="0.55">
      <rect x="20"  y="90"  width="30" height="22" rx="2"/>
      <rect x="65"  y="90"  width="30" height="22" rx="2" fill="#fbbf24"/>
      <rect x="110" y="90"  width="30" height="22" rx="2"/>
      <rect x="155" y="90"  width="30" height="22" rx="2"/>
      <rect x="20"  y="130" width="30" height="22" rx="2"/>
      <rect x="65"  y="130" width="30" height="22" rx="2"/>
      <rect x="110" y="130" width="30" height="22" rx="2"/>
      <rect x="155" y="130" width="30" height="22" rx="2" fill="#fbbf24"/>
      <rect x="20"  y="170" width="30" height="22" rx="2"/>
      <rect x="65"  y="170" width="30" height="22" rx="2"/>
      <rect x="110" y="170" width="30" height="22" rx="2"/>
      <rect x="155" y="170" width="30" height="22" rx="2"/>
      <rect x="20"  y="210" width="30" height="22" rx="2" fill="#fbbf24"/>
      <rect x="65"  y="210" width="30" height="22" rx="2"/>
      <rect x="110" y="210" width="30" height="22" rx="2"/>
      <rect x="155" y="210" width="30" height="22" rx="2"/>
      <rect x="20"  y="250" width="30" height="22" rx="2"/>
      <rect x="65"  y="250" width="30" height="22" rx="2"/>
      <rect x="110" y="250" width="30" height="22" rx="2" fill="#fbbf24"/>
      <rect x="155" y="250" width="30" height="22" rx="2"/>
      <rect x="20"  y="290" width="30" height="22" rx="2"/>
      <rect x="65"  y="290" width="30" height="22" rx="2"/>
      <rect x="110" y="290" width="30" height="22" rx="2"/>
      <rect x="155" y="290" width="30" height="22" rx="2"/>
      <rect x="20"  y="330" width="30" height="22" rx="2"/>
      <rect x="65"  y="330" width="30" height="22" rx="2"/>
      <rect x="110" y="330" width="30" height="22" rx="2" fill="#fbbf24"/>
      <rect x="155" y="330" width="30" height="22" rx="2"/>
    </g>
    <rect x="0" y="0" width="220" height="50" rx="8" fill="#F05252"/>
    <text x="110" y="32" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#fff" text-anchor="middle">Anthropic</text>
    <line x1="-20" y1="0" x2="-20" y2="-70" stroke="#94a3b8" stroke-width="3"/>
    <path d="M-20 -70 L-90 -55 L-20 -40 Z" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  </g>

  <!-- API line stream between towers -->
  <g filter="url(#glow)">
    <line x1="360" y1="320" x2="840" y2="320" stroke="url(#api-glow)" stroke-width="3" stroke-dasharray="8 6"/>
  </g>
  <text x="600" y="305" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#94a3b8" text-anchor="middle">api.openai.com</text>
  <text x="600" y="345" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#94a3b8" text-anchor="middle">api.anthropic.com</text>

  <!-- center briefcase: Consulting -->
  <g transform="translate(540, 360)">
    <rect x="0" y="20" width="120" height="80" rx="8" fill="#fbbf24" stroke="#92400e" stroke-width="2"/>
    <rect x="40" y="0" width="40" height="24" rx="6" fill="none" stroke="#92400e" stroke-width="3"/>
    <rect x="0" y="50" width="120" height="6" fill="#92400e" opacity="0.4"/>
    <text x="60" y="78" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="800" fill="#7c2d12" text-anchor="middle">CONSULTING</text>
  </g>
  <!-- price tag -->
  <g transform="translate(675, 380)">
    <path d="M0 0 L70 0 L80 14 L70 28 L0 28 Z" fill="#fff" stroke="#94a3b8" stroke-width="1"/>
    <circle cx="70" cy="14" r="3" fill="#94a3b8"/>
    <text x="36" y="18" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#0f172a" text-anchor="middle">$11.5B</text>
  </g>

  <!-- ticker tape at bottom -->
  <g transform="translate(0, 520)">
    <rect x="0" y="0" width="1200" height="40" fill="#0b1220"/>
    <text x="40" y="26" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#fbbf24" font-weight="700">▲ DEPLOYMENT CO.</text>
    <text x="240" y="26" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#94a3b8">$10B · TPG · Bain · Brookfield · SoftBank</text>
    <text x="660" y="26" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#fbbf24" font-weight="700">▲ ANTHROPIC × PE JV</text>
    <text x="880" y="26" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#94a3b8">$1.5B · Blackstone · H&amp;F · Goldman</text>
  </g>

  <!-- caption -->
  <text x="600" y="100" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800" fill="#f1f5f9" text-anchor="middle" letter-spacing="0.5">
    The day both labs raised a flag — and bought a briefcase.
  </text>
</svg>
