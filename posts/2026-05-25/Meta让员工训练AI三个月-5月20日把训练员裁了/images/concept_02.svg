<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500" role="img" aria-label="MCI 把员工屏幕活动喂进 AI 模型权重">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="streamGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1d4ed8" stop-opacity="0.05"/>
      <stop offset="0.4" stop-color="#1d4ed8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0.85"/>
    </linearGradient>
    <radialGradient id="brainGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7c3aed" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="900" height="500" fill="url(#bg2)"/>

  <!-- 标题条 -->
  <rect x="0" y="0" width="900" height="42" fill="#1e3a8a"/>
  <text x="40" y="27" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="14" font-weight="700" fill="#f8fafc" letter-spacing="0.5">MCI · Model Capability Initiative</text>
  <text x="860" y="27" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#bfdbfe" text-anchor="end">"No opt out on your work provided laptop."</text>

  <!-- 左侧：员工 + 笔记本 -->
  <g transform="translate(70,90)">
    <!-- 员工剪影 -->
    <g fill="#475569">
      <circle cx="60" cy="40" r="22"/>
      <path d="M 30 75 Q 30 110 60 115 Q 90 110 90 75 Z"/>
      <rect x="40" y="105" width="40" height="50" rx="3"/>
    </g>
    <!-- 笔记本 -->
    <g transform="translate(20,170)">
      <rect x="0" y="0" width="200" height="125" rx="6" fill="#1f2937"/>
      <rect x="6" y="6" width="188" height="113" rx="3" fill="#f1f5f9"/>
      <!-- 标题栏 -->
      <rect x="6" y="6" width="188" height="14" fill="#e2e8f0"/>
      <circle cx="14" cy="13" r="2.5" fill="#ef4444"/>
      <circle cx="22" cy="13" r="2.5" fill="#f59e0b"/>
      <circle cx="30" cy="13" r="2.5" fill="#10b981"/>
      <text x="100" y="16" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="6.5" fill="#475569" text-anchor="middle">Slack · GitHub · Atlassian · Threads</text>
      <!-- 代码行 -->
      <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="6.5">
        <text x="14" y="34" fill="#7c3aed">def</text>
        <text x="30" y="34" fill="#1e293b"> compute_proposal(req):</text>
        <text x="20" y="44" fill="#94a3b8">    """Quarterly review."""</text>
        <text x="20" y="54" fill="#1e293b">    return aggregate(req)</text>
        <text x="14" y="68" fill="#0ea5e9">@</text>
        <text x="20" y="68" fill="#1e293b">colleague: can you review</text>
        <text x="20" y="78" fill="#1e293b">the merge before EOD?</text>
        <text x="14" y="92" fill="#64748b">// TODO: rewrite this with</text>
        <text x="14" y="102" fill="#64748b">// the new API endpoint</text>
      </g>
      <!-- 鼠标轨迹 -->
      <path d="M 30 90 Q 60 60 100 75 Q 140 85 170 50" stroke="#ef4444" stroke-width="1.2" fill="none" stroke-dasharray="2 2" opacity="0.7"/>
      <circle cx="170" cy="50" r="3" fill="none" stroke="#ef4444" stroke-width="1.2"/>
      <!-- 底座 -->
      <rect x="-8" y="125" width="216" height="6" rx="2" fill="#374151"/>
    </g>
    <!-- 工程师身份标签 -->
    <text x="60" y="318" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" font-weight="700" fill="#1e293b" text-anchor="middle">Smart People</text>
    <text x="60" y="333" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="9" fill="#64748b" text-anchor="middle">U.S. employees · L5–L8</text>
  </g>

  <!-- 中间：采集流（四股数据流） -->
  <g transform="translate(290,110)">
    <!-- 四条数据流的标签 -->
    <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9">
      <text x="0" y="20" fill="#1e3a8a" font-weight="700">▸ keystrokes</text>
      <text x="0" y="80" fill="#1e3a8a" font-weight="700">▸ mouse trails</text>
      <text x="0" y="140" fill="#1e3a8a" font-weight="700">▸ clipboard</text>
      <text x="0" y="200" fill="#1e3a8a" font-weight="700">▸ screenshots</text>
    </g>
    <!-- 流体管道 -->
    <g stroke="url(#streamGrad)" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.85">
      <path d="M 90 20  L 270 110"/>
      <path d="M 90 80  L 270 115"/>
      <path d="M 90 140 L 270 120"/>
      <path d="M 90 200 L 270 125"/>
    </g>
    <!-- 流上的二进制小字 -->
    <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="7" fill="#fef3c7" opacity="0.9">
      <text x="155" y="55">01001</text>
      <text x="170" y="92">11010</text>
      <text x="155" y="135">00110</text>
      <text x="160" y="180">10110</text>
    </g>
    <!-- 中间标签：MCI -->
    <g transform="translate(125,225)">
      <rect x="0" y="0" width="120" height="30" rx="15" fill="#1e3a8a"/>
      <text x="60" y="20" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="700" fill="#fef3c7" text-anchor="middle">→ MCI →</text>
    </g>
  </g>

  <!-- 右侧：AI 模型权重（神经网络） -->
  <g transform="translate(620,120)">
    <ellipse cx="120" cy="130" rx="180" ry="180" fill="url(#brainGlow)"/>
    <!-- 节点网络 -->
    <g stroke="#7c3aed" stroke-width="0.7" opacity="0.55" fill="none">
      <line x1="40" y1="60" x2="100" y2="80"/>
      <line x1="100" y1="80" x2="170" y2="60"/>
      <line x1="170" y1="60" x2="220" y2="100"/>
      <line x1="40" y1="60" x2="60" y2="130"/>
      <line x1="60" y1="130" x2="100" y2="80"/>
      <line x1="100" y1="80" x2="130" y2="160"/>
      <line x1="130" y1="160" x2="60" y2="130"/>
      <line x1="130" y1="160" x2="170" y2="60"/>
      <line x1="130" y1="160" x2="200" y2="180"/>
      <line x1="200" y1="180" x2="220" y2="100"/>
      <line x1="200" y1="180" x2="160" y2="240"/>
      <line x1="160" y1="240" x2="130" y2="160"/>
      <line x1="160" y1="240" x2="80" y2="220"/>
      <line x1="80" y1="220" x2="60" y2="130"/>
      <line x1="80" y1="220" x2="130" y2="160"/>
      <line x1="160" y1="240" x2="60" y2="130"/>
    </g>
    <g fill="#7c3aed">
      <circle cx="40" cy="60" r="6"/>
      <circle cx="100" cy="80" r="7"/>
      <circle cx="170" cy="60" r="6"/>
      <circle cx="220" cy="100" r="7"/>
      <circle cx="60" cy="130" r="8" fill="#5b21b6"/>
      <circle cx="130" cy="160" r="10" fill="#5b21b6"/>
      <circle cx="200" cy="180" r="7"/>
      <circle cx="80" cy="220" r="6"/>
      <circle cx="160" cy="240" r="8" fill="#5b21b6"/>
    </g>
    <!-- 模型标签 -->
    <text x="120" y="295" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" font-weight="700" fill="#1e293b" text-anchor="middle">Meta AI Agent</text>
    <text x="120" y="310" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="9" fill="#64748b" text-anchor="middle">model weights · no tenant isolation</text>
  </g>

  <!-- 底部标语 -->
  <rect x="0" y="455" width="900" height="45" fill="#1e3a8a"/>
  <text x="450" y="478" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="14" font-weight="700" fill="#fef3c7" text-anchor="middle">「没有人在看你的屏幕——看的不是人，是模型。」</text>
  <text x="450" y="492" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="9" fill="#bfdbfe" text-anchor="middle">— Mark Zuckerberg, internal all-hands, 2026.04.30</text>
</svg>
