<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500" role="img" aria-label="凌晨四点收到裁员邮件的工程师 — 训练数据离场费">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1730"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <radialGradient id="screenGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#dbeafe" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#dbeafe" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="dataFlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#60a5fa" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#60a5fa" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
  </defs>

  <rect width="900" height="500" fill="url(#bgGrad)"/>

  <!-- 星点 -->
  <g fill="#cbd5e1" opacity="0.6">
    <circle cx="60" cy="70" r="0.8"/>
    <circle cx="180" cy="40" r="1.2"/>
    <circle cx="350" cy="90" r="0.6"/>
    <circle cx="520" cy="55" r="1"/>
    <circle cx="700" cy="80" r="0.7"/>
    <circle cx="820" cy="50" r="1.1"/>
    <circle cx="100" cy="130" r="0.5"/>
    <circle cx="780" cy="135" r="0.6"/>
  </g>

  <!-- 4:00 数字钟 -->
  <g transform="translate(60,40)" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#94a3b8">
    <text font-size="13" letter-spacing="2" opacity="0.85">04 : 00</text>
    <text y="18" font-size="9" letter-spacing="3" opacity="0.6">SGT  20.05.2026</text>
  </g>

  <!-- 神经网络背景纹理 -->
  <g stroke="#3b82f6" stroke-width="0.4" opacity="0.18" fill="none">
    <circle cx="720" cy="120" r="18"/>
    <circle cx="780" cy="160" r="14"/>
    <circle cx="820" cy="220" r="16"/>
    <circle cx="760" cy="260" r="12"/>
    <circle cx="700" cy="200" r="20"/>
    <circle cx="680" cy="280" r="14"/>
    <circle cx="820" cy="320" r="18"/>
    <circle cx="760" cy="360" r="12"/>
    <line x1="720" y1="120" x2="780" y2="160"/>
    <line x1="780" y1="160" x2="820" y2="220"/>
    <line x1="820" y1="220" x2="760" y2="260"/>
    <line x1="760" y1="260" x2="700" y2="200"/>
    <line x1="700" y1="200" x2="720" y2="120"/>
    <line x1="700" y1="200" x2="680" y2="280"/>
    <line x1="680" y1="280" x2="760" y2="360"/>
    <line x1="760" y1="360" x2="820" y2="320"/>
    <line x1="820" y1="320" x2="820" y2="220"/>
  </g>
  <g fill="#60a5fa" opacity="0.7">
    <circle cx="720" cy="120" r="3"/>
    <circle cx="780" cy="160" r="3"/>
    <circle cx="820" cy="220" r="3"/>
    <circle cx="760" cy="260" r="3"/>
    <circle cx="700" cy="200" r="3"/>
    <circle cx="680" cy="280" r="3"/>
    <circle cx="820" cy="320" r="3"/>
    <circle cx="760" cy="360" r="3"/>
  </g>

  <!-- 工程师剪影 + 床 -->
  <!-- 床 -->
  <rect x="110" y="370" width="380" height="20" rx="4" fill="#1f2937"/>
  <rect x="110" y="390" width="380" height="50" rx="2" fill="#0f172a"/>
  <!-- 枕头 -->
  <rect x="125" y="345" width="90" height="28" rx="6" fill="#334155"/>
  <!-- 被子 -->
  <path d="M 215 370 Q 350 360 480 380 L 480 395 Q 350 380 215 395 Z" fill="#475569"/>

  <!-- 人物剪影（侧坐，盘腿，盯着笔记本） -->
  <g fill="#0f172a" stroke="#1e293b" stroke-width="1">
    <!-- 头 -->
    <circle cx="285" cy="270" r="22"/>
    <!-- 头发轮廓 -->
    <path d="M 263 268 Q 268 250 285 248 Q 305 248 308 268 L 305 265 Q 298 255 285 256 Q 270 256 266 268 Z" fill="#020617"/>
    <!-- 躯干（弯曲，肩膀稍倾） -->
    <path d="M 260 290 Q 250 320 245 360 L 320 360 Q 322 320 308 290 Z"/>
    <!-- 大腿 -->
    <path d="M 245 360 L 360 365 L 360 380 L 245 380 Z"/>
    <!-- 手臂托笔记本 -->
    <path d="M 260 295 L 230 335 L 240 340 L 270 305 Z"/>
    <path d="M 310 295 L 360 320 L 358 325 L 308 305 Z"/>
  </g>

  <!-- 笔记本电脑 -->
  <g transform="translate(225,320)">
    <!-- 屏幕背板 -->
    <rect x="0" y="0" width="150" height="92" rx="4" fill="#1f2937"/>
    <!-- 屏幕画面 -->
    <rect x="4" y="4" width="142" height="84" rx="2" fill="#0f172a"/>
    <ellipse cx="75" cy="46" rx="80" ry="50" fill="url(#screenGlow)" opacity="0.6"/>
    <!-- 邮件框 -->
    <rect x="14" y="14" width="122" height="14" rx="2" fill="#1e293b" stroke="#475569" stroke-width="0.5"/>
    <text x="20" y="24" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="6" fill="#fca5a5" letter-spacing="0.4">▼ Janelle Gale · Meta HR  ·  04:00</text>
    <!-- 主体文字 -->
    <rect x="14" y="32" width="122" height="50" rx="2" fill="#020617"/>
    <text x="20" y="44" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="7" font-weight="700" fill="#fef2f2">Subject: Update on your role</text>
    <text x="20" y="56" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="5.5" fill="#cbd5e1">Dear Gary,</text>
    <text x="20" y="65" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="5.5" fill="#cbd5e1">After a thorough review, your</text>
    <text x="20" y="73" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="5.5" fill="#cbd5e1">position has been eliminated...</text>
    <!-- 底座 -->
    <rect x="-8" y="92" width="166" height="6" rx="2" fill="#374151"/>
  </g>

  <!-- 数据流：从笔记本 → 神经网络 -->
  <g stroke="url(#dataFlow)" stroke-width="2" fill="none" opacity="0.85">
    <path d="M 380 360 Q 480 320 580 280 Q 640 240 690 200" stroke-dasharray="4 3"/>
    <path d="M 380 350 Q 500 300 620 240 Q 660 215 700 195" stroke-dasharray="2 4" opacity="0.7"/>
    <path d="M 380 370 Q 460 340 540 310 Q 620 290 690 280" stroke-dasharray="3 5" opacity="0.6"/>
  </g>

  <!-- 数据流上的"训练数据 token"小标 -->
  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="8" fill="#fbbf24" opacity="0.85">
    <text x="450" y="305">{ keystroke }</text>
    <text x="540" y="265">{ click }</text>
    <text x="600" y="225">{ screenshot }</text>
    <text x="470" y="345">{ clipboard }</text>
  </g>

  <!-- 右上角：MCI 流向标签 -->
  <g transform="translate(675,90)" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
    <rect x="0" y="0" width="180" height="36" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="0.6" opacity="0.92"/>
    <text x="10" y="14" font-size="9" font-weight="700" fill="#60a5fa" letter-spacing="1">MCI · Superintelligence Labs</text>
    <text x="10" y="28" font-size="8" fill="#cbd5e1">your work → model weights</text>
  </g>

  <!-- 底部标题条 -->
  <rect x="0" y="455" width="900" height="45" fill="#020617"/>
  <text x="40" y="478" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="700" fill="#fef3c7">5 月 20 日凌晨 4 点的新加坡</text>
  <text x="40" y="492" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" fill="#94a3b8">他亲手训练了取代自己的工具，然后被取代了</text>
  <text x="860" y="492" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9" fill="#475569" text-anchor="end">3544 days · Gary Tay · Meta AdTech</text>
</svg>
