<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdf6e3"/>
      <stop offset="100%" stop-color="#f4ead0"/>
    </linearGradient>
    <linearGradient id="rackShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1917"/>
      <stop offset="100%" stop-color="#3a2a1b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="400" y="34" text-anchor="middle" font-family="'Noto Serif SC', 'STSong', serif" font-size="17" fill="#5b4636" font-style="italic">"被 AI 替代"的帽子很喜庆，可工位上坐着 GPU</text>

  <!-- Office building (left half) -->
  <g>
    <!-- building outline -->
    <rect x="60" y="80" width="430" height="280" fill="#ffffff" stroke="#5b4636" stroke-width="2.5"/>
    <!-- roof line -->
    <line x1="60" y1="80" x2="490" y2="80" stroke="#5b4636" stroke-width="4"/>
    <!-- door (open, right side of building) -->
    <rect x="460" y="240" width="30" height="120" fill="#fdf6e3" stroke="#5b4636" stroke-width="2.5"/>
    <!-- "EXIT" sign -->
    <rect x="450" y="220" width="50" height="18" fill="#c0392b" rx="2"/>
    <text x="475" y="234" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff" font-weight="bold">EXIT</text>

    <!-- GPU server racks (filling the office) -->
    <g>
      <!-- top row -->
      <rect x="80" y="105" width="48" height="115" fill="url(#rackShade)" rx="2"/>
      <rect x="138" y="105" width="48" height="115" fill="url(#rackShade)" rx="2"/>
      <rect x="196" y="105" width="48" height="115" fill="url(#rackShade)" rx="2"/>
      <rect x="254" y="105" width="48" height="115" fill="url(#rackShade)" rx="2"/>
      <rect x="312" y="105" width="48" height="115" fill="url(#rackShade)" rx="2"/>
      <rect x="370" y="105" width="48" height="115" fill="url(#rackShade)" rx="2"/>
      <!-- bottom row -->
      <rect x="80" y="240" width="48" height="115" fill="url(#rackShade)" rx="2"/>
      <rect x="138" y="240" width="48" height="115" fill="url(#rackShade)" rx="2"/>
      <rect x="196" y="240" width="48" height="115" fill="url(#rackShade)" rx="2"/>
      <rect x="254" y="240" width="48" height="115" fill="url(#rackShade)" rx="2"/>
      <rect x="312" y="240" width="48" height="115" fill="url(#rackShade)" rx="2"/>
      <rect x="370" y="240" width="48" height="115" fill="url(#rackShade)" rx="2"/>
    </g>

    <!-- LED rows on each rack -->
    <g fill="#22c55e">
      <circle cx="104" cy="125" r="2.5"/><circle cx="162" cy="125" r="2.5"/><circle cx="220" cy="125" r="2.5"/>
      <circle cx="278" cy="125" r="2.5"/><circle cx="336" cy="125" r="2.5"/><circle cx="394" cy="125" r="2.5"/>
      <circle cx="104" cy="145" r="2.5"/><circle cx="162" cy="145" r="2.5"/><circle cx="220" cy="145" r="2.5"/>
      <circle cx="278" cy="145" r="2.5"/><circle cx="336" cy="145" r="2.5"/><circle cx="394" cy="145" r="2.5"/>
      <circle cx="104" cy="260" r="2.5"/><circle cx="162" cy="260" r="2.5"/><circle cx="220" cy="260" r="2.5"/>
      <circle cx="278" cy="260" r="2.5"/><circle cx="336" cy="260" r="2.5"/><circle cx="394" cy="260" r="2.5"/>
      <circle cx="104" cy="280" r="2.5"/><circle cx="162" cy="280" r="2.5"/><circle cx="220" cy="280" r="2.5"/>
      <circle cx="278" cy="280" r="2.5"/><circle cx="336" cy="280" r="2.5"/><circle cx="394" cy="280" r="2.5"/>
    </g>

    <!-- Empty office chair tipped over (just one, to show humans left) -->
    <g transform="translate(420,335) rotate(-20)">
      <rect x="-15" y="-12" width="20" height="6" fill="#7c5e3c"/>
      <rect x="-12" y="-30" width="14" height="20" fill="#7c5e3c"/>
      <line x1="-5" y1="-5" x2="-12" y2="6" stroke="#5b4636" stroke-width="2"/>
      <line x1="-5" y1="-5" x2="3" y2="6" stroke="#5b4636" stroke-width="2"/>
    </g>
  </g>

  <!-- Person walking out (right side) -->
  <g transform="translate(620,230)">
    <!-- shadow -->
    <ellipse cx="0" cy="120" rx="36" ry="5" fill="#5b4636" fill-opacity="0.18"/>
    <!-- AI party hat (red triangle) -->
    <path d="M -22 -38 L 22 -38 L 0 -85 Z" fill="#c0392b"/>
    <!-- hat decoration / pompom -->
    <circle cx="0" cy="-85" r="5" fill="#f5d76e"/>
    <!-- hat label "AI" -->
    <text x="0" y="-55" text-anchor="middle" font-family="'Noto Serif SC', serif" font-size="14" fill="#fff" font-weight="bold">AI</text>
    <!-- head -->
    <circle cx="0" cy="-20" r="20" fill="#f7d2a4" stroke="#5b4636" stroke-width="1.5"/>
    <!-- sad eyes -->
    <circle cx="-7" cy="-22" r="1.8" fill="#1c1917"/>
    <circle cx="7" cy="-22" r="1.8" fill="#1c1917"/>
    <!-- downturned mouth -->
    <path d="M -6 -10 Q 0 -14 6 -10" stroke="#1c1917" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <!-- body (shirt) -->
    <path d="M -25 5 L -25 70 L 25 70 L 25 5 Z" fill="#3b6286"/>
    <!-- shirt v collar -->
    <path d="M -25 5 L 0 18 L 25 5 L 25 -2 L 0 12 L -25 -2 Z" fill="#fdf6e3"/>
    <!-- arms -->
    <path d="M -25 8 L -42 60 L -32 65 L -15 18 Z" fill="#3b6286"/>
    <path d="M 25 8 L 42 60 L 36 70 L 18 22 Z" fill="#3b6286"/>
    <!-- termination letter in right hand -->
    <g transform="translate(40,70)">
      <rect x="-12" y="-15" width="28" height="34" fill="#ffffff" stroke="#5b4636" stroke-width="1.5"/>
      <line x1="-7" y1="-8" x2="11" y2="-8" stroke="#1c1917" stroke-width="0.8"/>
      <line x1="-7" y1="-2" x2="11" y2="-2" stroke="#1c1917" stroke-width="0.8"/>
      <line x1="-7" y1="4" x2="11" y2="4" stroke="#1c1917" stroke-width="0.8"/>
      <line x1="-7" y1="10" x2="6" y2="10" stroke="#1c1917" stroke-width="0.8"/>
      <text x="2" y="-12" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#c0392b" font-weight="bold">termination</text>
    </g>
    <!-- legs (walking) -->
    <path d="M -15 70 L -20 115 L -10 115 L -6 70 Z" fill="#2d3748"/>
    <path d="M 15 70 L 22 115 L 32 110 L 22 65 Z" fill="#2d3748"/>
    <!-- shoes -->
    <ellipse cx="-15" cy="118" rx="10" ry="4" fill="#1c1917"/>
    <ellipse cx="27" cy="112" rx="10" ry="4" fill="#1c1917"/>
  </g>

  <!-- Arrow from building to person showing exit direction -->
  <g stroke="#5b4636" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M 500 295 L 570 295" stroke-dasharray="6 4"/>
    <path d="M 562 290 L 572 295 L 562 300" fill="#5b4636"/>
  </g>

  <!-- Bottom caption -->
  <text x="400" y="385" text-anchor="middle" font-family="'Noto Serif SC', serif" font-size="13" fill="#5b4636" font-style="italic">帽子上写着"未来"，底层会计科目写的是"现金流"</text>
</svg>
