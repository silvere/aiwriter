<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdf6e3"/>
      <stop offset="100%" stop-color="#f4ead0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="380" fill="url(#bg1)"/>

  <!-- Title strip -->
  <text x="400" y="38" text-anchor="middle" font-family="'Noto Serif SC', 'STSong', serif" font-size="18" fill="#5b4636" font-style="italic">同一份 memo，同一个 CEO，两种说法</text>

  <!-- Center figure: corporate suit -->
  <g transform="translate(400,220)">
    <!-- shadow -->
    <ellipse cx="0" cy="100" rx="48" ry="6" fill="#5b4636" fill-opacity="0.15"/>
    <!-- body -->
    <path d="M -32 -10 L -32 90 L 32 90 L 32 -10 Z" fill="#2d3748"/>
    <!-- tie -->
    <path d="M -4 -5 L 4 -5 L 6 70 L 0 80 L -6 70 Z" fill="#c0392b"/>
    <!-- collar -->
    <path d="M -32 -10 L -10 5 L 0 -5 L 10 5 L 32 -10 L 32 0 L 0 8 L -32 0 Z" fill="#f9f4e3"/>
    <!-- head -->
    <circle cx="0" cy="-32" r="22" fill="#f7d2a4" stroke="#5b4636" stroke-width="1.5"/>
    <!-- eyes -->
    <circle cx="-7" cy="-34" r="1.8" fill="#1c1917"/>
    <circle cx="7" cy="-34" r="1.8" fill="#1c1917"/>
    <!-- mouth (wry smile) -->
    <path d="M -7 -22 Q 0 -18 7 -22" stroke="#1c1917" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Left speech bubble: "AI" with up arrow -->
  <g>
    <path d="M 95 110 Q 70 110 70 138 Q 70 175 110 180 L 130 200 L 140 180 L 230 180 Q 260 180 260 148 Q 260 110 230 110 Z" fill="#ffffff" stroke="#5b4636" stroke-width="2.5"/>
    <text x="165" y="160" text-anchor="middle" font-family="'Noto Serif SC', serif" font-size="42" font-weight="bold" fill="#2d3748">AI</text>
    <!-- up arrow -->
    <g transform="translate(218,150)">
      <line x1="0" y1="10" x2="0" y2="-12" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/>
      <path d="M -6 -6 L 0 -14 L 6 -6 Z" fill="#22c55e"/>
    </g>
    <!-- caption below bubble -->
    <text x="165" y="218" text-anchor="middle" font-family="'Noto Serif SC', serif" font-size="13" fill="#5b4636">"我们要重新聚焦 AI"</text>
  </g>

  <!-- Right speech bubble: "不是 AI" -->
  <g>
    <path d="M 540 110 Q 510 110 510 145 Q 510 175 550 180 L 565 200 L 580 180 L 700 180 Q 730 180 730 145 Q 730 110 700 110 Z" fill="#ffffff" stroke="#5b4636" stroke-width="2.5"/>
    <text x="620" y="158" text-anchor="middle" font-family="'Noto Serif SC', serif" font-size="32" font-weight="bold" fill="#c0392b">不 是 AI</text>
    <!-- caption -->
    <text x="620" y="218" text-anchor="middle" font-family="'Noto Serif SC', serif" font-size="13" fill="#5b4636">"AI 不是这次裁员的原因"</text>
  </g>

  <!-- Conflict lines from both bubbles to the suit -->
  <line x1="260" y1="160" x2="365" y2="200" stroke="#5b4636" stroke-width="1.2" stroke-dasharray="4 4"/>
  <line x1="510" y1="160" x2="435" y2="200" stroke="#5b4636" stroke-width="1.2" stroke-dasharray="4 4"/>

  <!-- Bottom caption -->
  <text x="400" y="350" text-anchor="middle" font-family="'Noto Serif SC', serif" font-size="14" fill="#5b4636" font-style="italic">每个字都对，组合起来你就知道发生了什么</text>
</svg>
