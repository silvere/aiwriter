<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bgD1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdf6e3"/>
      <stop offset="100%" stop-color="#f4ead0"/>
    </linearGradient>
  </defs>
  <rect width="880" height="460" fill="url(#bgD1)"/>

  <!-- Title -->
  <text x="440" y="34" text-anchor="middle" font-family="'Noto Serif SC', 'STSong', serif" font-size="20" fill="#2d3748" font-weight="bold">Meta 2026 的资金流向：人是最便宜的一项</text>
  <text x="440" y="56" text-anchor="middle" font-family="'Noto Serif SC', serif" font-size="13" fill="#5b4636" font-style="italic">每个粗细严格按金额比例 · Q1 营收 → AI Capex vs 员工工资</text>

  <!-- Left source box: Q1 revenue -->
  <g>
    <rect x="40" y="180" width="170" height="100" rx="8" fill="#2d3748" stroke="#1c1917" stroke-width="2"/>
    <text x="125" y="215" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold">Q1 2026 营收</text>
    <text x="125" y="245" text-anchor="middle" font-family="sans-serif" font-size="26" fill="#f5d76e" font-weight="bold">$56.31B</text>
    <text x="125" y="265" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#cbd5e0">同比 +33%</text>
  </g>

  <!-- Net profit middle box -->
  <g>
    <rect x="280" y="180" width="170" height="100" rx="8" fill="#3aa55a" stroke="#1c1917" stroke-width="2"/>
    <text x="365" y="215" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold">Q1 净利润</text>
    <text x="365" y="245" text-anchor="middle" font-family="sans-serif" font-size="26" fill="#fff" font-weight="bold">$26.77B</text>
    <text x="365" y="265" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#dcfce7">同比 +61% ↑</text>
  </g>

  <!-- Flow from revenue to profit -->
  <path d="M 210 230 L 280 230" stroke="#5b4636" stroke-width="14" fill="none"/>
  <path d="M 275 224 L 285 230 L 275 236 Z" fill="#5b4636"/>

  <!-- Top right: AI Capex (huge thick arrow) -->
  <g>
    <rect x="600" y="80" width="240" height="120" rx="8" fill="#1e3a8a" stroke="#1c1917" stroke-width="2"/>
    <text x="720" y="115" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#fff" font-weight="bold">AI Capex 2026 指引</text>
    <text x="720" y="150" text-anchor="middle" font-family="sans-serif" font-size="34" fill="#f5d76e" font-weight="bold">$145B</text>
    <text x="720" y="175" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#bfdbfe">GPU · 数据中心 · 第三方算力</text>
    <text x="720" y="192" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#bfdbfe">每天烧 $397M</text>
  </g>

  <!-- Thick flow arrow profit → capex (huge) -->
  <path d="M 450 200 Q 510 170 600 140" stroke="#1e3a8a" stroke-width="40" fill="none" stroke-linecap="round" opacity="0.85"/>
  <text x="520" y="160" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#fff" font-weight="bold">巨流</text>

  <!-- Middle right: employee wages (medium) -->
  <g>
    <rect x="600" y="220" width="240" height="80" rx="8" fill="#7c5e3c" stroke="#1c1917" stroke-width="2"/>
    <text x="720" y="248" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold">员工总工资支出</text>
    <text x="720" y="278" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#fff">中等流量</text>
  </g>
  <!-- Medium arrow -->
  <path d="M 450 250 L 600 260" stroke="#7c5e3c" stroke-width="14" fill="none" opacity="0.85"/>

  <!-- Bottom right: 8000 layoff cut -->
  <g>
    <rect x="600" y="320" width="240" height="100" rx="8" fill="#c0392b" stroke="#1c1917" stroke-width="2"/>
    <text x="720" y="350" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold">5/20 被裁的 8000 人</text>
    <text x="720" y="380" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#f5d76e" font-weight="bold">≈ $2B / 年</text>
    <text x="720" y="402" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fcd9d9">仅够 capex 烧 5 天</text>
  </g>
  <!-- Tiny dashed arrow with X (cut) -->
  <path d="M 450 270 Q 510 300 600 360" stroke="#c0392b" stroke-width="4" fill="none" stroke-dasharray="6 6" opacity="0.9"/>
  <g transform="translate(528,323)">
    <line x1="-8" y1="-8" x2="8" y2="8" stroke="#c0392b" stroke-width="3"/>
    <line x1="-8" y1="8" x2="8" y2="-8" stroke="#c0392b" stroke-width="3"/>
  </g>

  <!-- Comparison annotation under capex vs layoff -->
  <line x1="600" y1="440" x2="840" y2="440" stroke="#5b4636" stroke-width="0.8"/>
  <text x="720" y="455" text-anchor="middle" font-family="'Noto Serif SC', serif" font-size="12" fill="#5b4636" font-style="italic">$2B 之于 $145B = 1.4%</text>
</svg>
