<svg xmlns="http://www.w3.org/2000/svg" width="640" height="300" viewBox="0 0 640 300" font-family="'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',sans-serif">
  <rect width="640" height="300" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="639" height="299" fill="none" stroke="#e2e8f0"/>
  <rect x="0" y="0" width="640" height="42" fill="#1A56DB"/>
  <text x="24" y="27" fill="#ffffff" font-size="16" font-weight="700">Anthropic 的一周</text>

  <!-- timeline axis -->
  <line x1="70" y1="150" x2="582" y2="150" stroke="#C7D2FE" stroke-width="3"/>
  <path d="M 588 150 l -14 -7 l 0 14 z" fill="#C7D2FE"/>

  <!-- node 1: 6/4 -->
  <text x="105" y="108" fill="#1A56DB" font-size="15" font-weight="700" text-anchor="middle">6/4</text>
  <circle cx="105" cy="150" r="9" fill="#1A56DB" stroke="#ffffff" stroke-width="3"/>
  <text x="105" y="186" fill="#374151" font-size="11.5" text-anchor="middle">发文求</text>
  <text x="105" y="204" fill="#374151" font-size="11.5" text-anchor="middle">"全球暂停危险 AI"</text>

  <!-- node 2: 6/9 -->
  <text x="252" y="108" fill="#1A56DB" font-size="15" font-weight="700" text-anchor="middle">6/9</text>
  <circle cx="252" cy="150" r="9" fill="#1A56DB" stroke="#ffffff" stroke-width="3"/>
  <text x="252" y="186" fill="#374151" font-size="11.5" text-anchor="middle">高调发布最强模型</text>
  <text x="252" y="204" fill="#374151" font-size="11.5" text-anchor="middle">Fable 5 / Mythos 5</text>

  <!-- node 3: 6/10 -->
  <text x="399" y="108" fill="#1A56DB" font-size="15" font-weight="700" text-anchor="middle">6/10</text>
  <circle cx="399" cy="150" r="9" fill="#1A56DB" stroke="#ffffff" stroke-width="3"/>
  <text x="399" y="186" fill="#374151" font-size="11.5" text-anchor="middle">求政府"应能</text>
  <text x="399" y="204" fill="#374151" font-size="11.5" text-anchor="middle">封杀不安全模型"</text>

  <!-- node 4: 6/12 (the kill) -->
  <text x="540" y="108" fill="#F05252" font-size="15" font-weight="700" text-anchor="middle">6/12</text>
  <circle cx="540" cy="150" r="10" fill="#F05252" stroke="#ffffff" stroke-width="3"/>
  <text x="540" y="186" fill="#B91C1C" font-size="11.5" font-weight="700" text-anchor="middle">政府封杀</text>
  <text x="540" y="204" fill="#B91C1C" font-size="11.5" font-weight="700" text-anchor="middle">Fable 5 / Mythos 5</text>

  <!-- punchline banner -->
  <rect x="0" y="258" width="640" height="42" fill="#111827"/>
  <text x="320" y="284" fill="#ffffff" font-size="15" font-weight="700" text-anchor="middle">他用六天论证模型有多危险，第七天政府照单全收</text>
</svg>
