<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <pattern id="dollar" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <text x="20" y="50" font-family="Georgia, serif" font-size="48" fill="#0f172a" opacity="0.05">$</text>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dollar)"/>

  <!-- Left: Rocket (SpaceX) -->
  <g transform="translate(180,180)" filter="url(#shadow)">
    <path d="M 0,180 L 40,40 Q 50,0 60,40 L 100,180 Z" fill="#1e293b"/>
    <path d="M 0,180 L 30,180 L 50,210 Z" fill="#475569"/>
    <path d="M 100,180 L 70,180 L 50,210 Z" fill="#475569"/>
    <circle cx="50" cy="80" r="14" fill="#fbbf24"/>
    <circle cx="50" cy="80" r="6" fill="#ffffff"/>
    <path d="M 30,220 L 50,300 L 70,220 Z" fill="#f97316" opacity="0.85"/>
    <path d="M 40,220 L 50,260 L 60,220 Z" fill="#fde047"/>
    <text x="50" y="350" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#1e293b" text-anchor="middle">SpaceX</text>
    <text x="50" y="376" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">S-1, 2026-05-20</text>
  </g>

  <!-- Right: Brain (Anthropic) -->
  <g transform="translate(900,180)" filter="url(#shadow)">
    <path d="M 50,30 C 10,30 -10,80 10,110 C -5,140 20,180 60,180 C 80,200 130,200 150,180 C 190,180 215,140 200,110 C 220,80 200,30 160,30 C 140,10 70,10 50,30 Z"
          fill="#3b82f6" opacity="0.9"/>
    <path d="M 105,40 L 105,180" stroke="#1e3a8a" stroke-width="2.5" fill="none"/>
    <path d="M 70,80 Q 90,70 105,90 Q 120,70 140,80" stroke="#1e3a8a" stroke-width="2" fill="none"/>
    <path d="M 60,130 Q 85,120 105,140 Q 125,120 150,130" stroke="#1e3a8a" stroke-width="2" fill="none"/>
    <path d="M 80,160 Q 105,150 130,160" stroke="#1e3a8a" stroke-width="2" fill="none"/>
    <text x="105" y="350" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#1e293b" text-anchor="middle">Anthropic</text>
    <text x="105" y="376" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">$900B 估值 / Q2 首盈</text>
  </g>

  <!-- Middle: Contract -->
  <g transform="translate(500,210)" filter="url(#shadow)">
    <rect x="0" y="0" width="200" height="240" rx="8" fill="url(#paper)" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="100" y="34" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">COMPUTE AGREEMENT</text>
    <line x1="20" y1="50" x2="180" y2="50" stroke="#e2e8f0" stroke-width="1"/>
    <text x="20" y="78" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#475569">Monthly Rent</text>
    <text x="180" y="78" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#dc2626" text-anchor="end">$1.25B</text>
    <text x="20" y="108" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#475569">Duration</text>
    <text x="180" y="108" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#0f172a" text-anchor="end">36 months</text>
    <text x="20" y="138" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#475569">Total Value</text>
    <text x="180" y="138" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#dc2626" text-anchor="end">~$40B</text>
    <text x="20" y="168" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#475569">GPUs (Colossus 1)</text>
    <text x="180" y="168" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#0f172a" text-anchor="end">220,000</text>
    <text x="20" y="198" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#475569">First 2 Months</text>
    <text x="180" y="198" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#16a34a" text-anchor="end">DISCOUNT</text>
    <line x1="20" y1="215" x2="180" y2="215" stroke="#e2e8f0" stroke-width="1"/>
    <text x="100" y="230" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Source: SpaceX S-1, p.287</text>
  </g>

  <!-- Arrows: bidirectional flow -->
  <g stroke="#64748b" stroke-width="2.5" fill="none">
    <path d="M 320,330 L 480,330" marker-end="url(#arrow)"/>
    <path d="M 720,330 L 880,330" marker-end="url(#arrow)"/>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#64748b"/>
    </marker>
  </defs>
  <text x="400" y="320" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#475569" text-anchor="middle">闲置算力</text>
  <text x="800" y="320" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#dc2626" text-anchor="middle">现金 + "客户收入"</text>

  <!-- Bottom banner -->
  <rect x="0" y="540" width="1200" height="90" fill="#0f172a"/>
  <text x="600" y="585" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">同一笔交易，三种披露口径</text>
  <text x="600" y="612" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">SpaceX 招股书写"客户收入"  ·  Anthropic 公告写"算力合作"  ·  Bloomberg 报道写"首次盈利"</text>
</svg>
