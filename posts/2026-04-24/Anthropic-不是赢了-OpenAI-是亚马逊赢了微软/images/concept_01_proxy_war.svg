<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="100%" style="max-width:800px;display:block;margin:0 auto">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="stageGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A56DB"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="480" fill="url(#bgGrad)"/>

  <!-- Curtain/Theatre top -->
  <path d="M 0 0 L 800 0 L 800 60 Q 400 120 0 60 Z" fill="#6366f1" opacity="0.25"/>
  <path d="M 0 0 L 800 0 L 800 30 Q 400 80 0 30 Z" fill="#4f46e5" opacity="0.35"/>

  <!-- Back row: three cloud corporation ledgers -->
  <g opacity="0.9">
    <!-- Amazon -->
    <rect x="80" y="130" width="140" height="170" rx="10" fill="#fbbf24" filter="url(#softShadow)"/>
    <text x="150" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#78350f">AMAZON</text>
    <text x="150" y="185" text-anchor="middle" font-family="monospace" font-size="11" fill="#78350f">AWS LEDGER</text>
    <line x1="100" y1="200" x2="200" y2="200" stroke="#78350f" stroke-width="1"/>
    <text x="110" y="220" font-family="monospace" font-size="10" fill="#1e293b">+ $33B invest</text>
    <text x="110" y="238" font-family="monospace" font-size="10" fill="#16a34a" font-weight="700">← $100B compute</text>
    <text x="110" y="256" font-family="monospace" font-size="10" fill="#16a34a" font-weight="700">= $67B net IN</text>
    <text x="110" y="280" font-family="monospace" font-size="9" fill="#475569">🤑 smiling</text>

    <!-- Google -->
    <rect x="330" y="130" width="140" height="170" rx="10" fill="#bbf7d0" filter="url(#softShadow)"/>
    <text x="400" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#14532d">GOOGLE</text>
    <text x="400" y="185" text-anchor="middle" font-family="monospace" font-size="11" fill="#14532d">TPU LEDGER</text>
    <line x1="350" y1="200" x2="450" y2="200" stroke="#14532d" stroke-width="1"/>
    <text x="360" y="220" font-family="monospace" font-size="10" fill="#1e293b">+ equity stake</text>
    <text x="360" y="238" font-family="monospace" font-size="10" fill="#16a34a" font-weight="700">← 3.5 GW TPU</text>
    <text x="360" y="256" font-family="monospace" font-size="10" fill="#16a34a" font-weight="700">= booked capex</text>
    <text x="360" y="280" font-family="monospace" font-size="9" fill="#475569">🤑 calculating</text>

    <!-- Microsoft (losing side) -->
    <rect x="580" y="130" width="140" height="170" rx="10" fill="#fecaca" filter="url(#softShadow)"/>
    <text x="650" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#7f1d1d">MICROSOFT</text>
    <text x="650" y="185" text-anchor="middle" font-family="monospace" font-size="11" fill="#7f1d1d">AZURE LEDGER</text>
    <line x1="600" y1="200" x2="700" y2="200" stroke="#7f1d1d" stroke-width="1"/>
    <text x="610" y="220" font-family="monospace" font-size="10" fill="#1e293b">+ $15B invest</text>
    <text x="610" y="238" font-family="monospace" font-size="10" fill="#dc2626" font-weight="700">← $30B compute</text>
    <text x="610" y="256" font-family="monospace" font-size="10" fill="#dc2626" font-weight="700">(junior seat)</text>
    <text x="610" y="280" font-family="monospace" font-size="9" fill="#475569">😐 side dish</text>
  </g>

  <!-- Stage spotlight beams -->
  <polygon points="280,330 520,330 600,430 200,430" fill="#fef9c3" opacity="0.55"/>

  <!-- Front stage -->
  <rect x="120" y="350" width="560" height="70" rx="6" fill="url(#stageGrad)" filter="url(#softShadow)"/>
  <text x="400" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#fef9c3" letter-spacing="2">THE STAGE</text>

  <!-- OpenAI figure -->
  <g transform="translate(260, 330)">
    <circle cx="0" cy="-10" r="18" fill="#10a37f"/>
    <text x="0" y="-6" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#fff">OAI</text>
    <rect x="-20" y="8" width="40" height="40" rx="4" fill="#10a37f"/>
    <text x="0" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff" font-weight="700">OpenAI</text>
  </g>
  <!-- Anthropic figure -->
  <g transform="translate(540, 330)">
    <circle cx="0" cy="-10" r="18" fill="#d97706"/>
    <text x="0" y="-6" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#fff">Ant</text>
    <rect x="-20" y="8" width="40" height="40" rx="4" fill="#d97706"/>
    <text x="0" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff" font-weight="700">Claude</text>
  </g>

  <!-- Handshake line -->
  <path d="M 280 320 Q 400 340 520 320" stroke="#fef9c3" stroke-width="3" fill="none" opacity="0.85"/>
  <text x="400" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1e3a8a" font-weight="700">"AI 一哥换人"</text>

  <!-- Labels at top -->
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1e3a8a">台上：AI 公司握手 | 台后：云厂商结账</text>
  <text x="400" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569" font-style="italic">镜头追着舞台，钱在幕布后转圈</text>

  <!-- Arrow from ledgers to stage -->
  <path d="M 150 305 Q 200 330 260 350" stroke="#64748b" stroke-width="1.5" fill="none" stroke-dasharray="4 4"/>
  <path d="M 400 305 Q 400 330 400 350" stroke="#64748b" stroke-width="1.5" fill="none" stroke-dasharray="4 4"/>
  <path d="M 650 305 Q 600 330 540 350" stroke="#64748b" stroke-width="1.5" fill="none" stroke-dasharray="4 4"/>

  <!-- Footer -->
  <text x="400" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">data: Forge Global 2026-04-23</text>
</svg>
