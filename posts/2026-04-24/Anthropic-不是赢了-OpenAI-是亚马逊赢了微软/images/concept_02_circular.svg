<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="100%" style="max-width:800px;display:block;margin:0 auto">
  <defs>
    <linearGradient id="cBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1A56DB"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
  </defs>

  <rect width="800" height="460" fill="url(#cBg)"/>

  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#1e3a8a">Circular Revenue 循环收入：同一块钱记两遍</text>
  <text x="400" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569" font-style="italic">云厂商投 AI 公司 → AI 公司买云厂商算力 → 账本两边同时增长</text>

  <!-- Cloud provider node -->
  <g>
    <rect x="60" y="140" width="220" height="160" rx="14" fill="#fff" stroke="#1A56DB" stroke-width="2"/>
    <text x="170" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1e3a8a">Hyperscaler 云厂商</text>
    <text x="170" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">AWS · Google · Microsoft</text>
    <rect x="80" y="210" width="180" height="30" rx="6" fill="#eff6ff"/>
    <text x="170" y="230" text-anchor="middle" font-family="monospace" font-size="11" fill="#1e3a8a">📒 +投资收益（股权涨）</text>
    <rect x="80" y="250" width="180" height="30" rx="6" fill="#fef3c7"/>
    <text x="170" y="270" text-anchor="middle" font-family="monospace" font-size="11" fill="#92400e">📒 +营收增长（算力卖出）</text>
  </g>

  <!-- AI Lab node -->
  <g>
    <rect x="520" y="140" width="220" height="160" rx="14" fill="#fff" stroke="#d97706" stroke-width="2"/>
    <text x="630" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#92400e">AI Lab 前沿实验室</text>
    <text x="630" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">Anthropic · OpenAI</text>
    <rect x="540" y="210" width="180" height="30" rx="6" fill="#fef3c7"/>
    <text x="630" y="230" text-anchor="middle" font-family="monospace" font-size="11" fill="#92400e">📒 +融资到账</text>
    <rect x="540" y="250" width="180" height="30" rx="6" fill="#dcfce7"/>
    <text x="630" y="270" text-anchor="middle" font-family="monospace" font-size="11" fill="#14532d">📒 +收入增长（ARR飙升）</text>
  </g>

  <!-- Arrow: Cloud → AI (invest) -->
  <path d="M 285 195 Q 400 165 515 195" stroke="#1A56DB" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>
  <rect x="340" y="140" width="130" height="26" rx="13" fill="#1A56DB"/>
  <text x="405" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#fff">①  投资 $33B / $15B</text>

  <!-- Arrow: AI → Cloud (buy compute) -->
  <path d="M 515 255 Q 400 290 285 255" stroke="#dc2626" stroke-width="2.5" fill="none" marker-end="url(#arrRed)"/>
  <rect x="320" y="290" width="170" height="26" rx="13" fill="#dc2626"/>
  <text x="405" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#fff">②  算力合约 $1000 亿 +</text>

  <!-- Bottom box: The trick -->
  <rect x="120" y="350" width="560" height="80" rx="10" fill="#1e3a8a"/>
  <text x="400" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#fef9c3">每一块钱，在这个闭环里能被记两次（有时候三次）</text>
  <text x="400" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#bfdbfe">Anthropic 未来几年要回流三大云厂商的算力合约金额：≥ $1300 亿</text>
  <text x="400" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#bfdbfe">同期 Anthropic 年化收入：$300 亿（刚追上零头）</text>
</svg>
