<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="wallGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="floorGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#cbd5e1"/>
      <stop offset="1" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="desk" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#a16207"/>
      <stop offset="1" stop-color="#713f12"/>
    </linearGradient>
    <linearGradient id="deskTop" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#d6a560"/>
      <stop offset="1" stop-color="#a16207"/>
    </linearGradient>
    <linearGradient id="chair" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#475569"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="sunBeam" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fef3c7" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#fef3c7" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- wall -->
  <rect width="800" height="320" fill="url(#wallGrad)"/>
  <!-- floor -->
  <rect y="320" width="800" height="130" fill="url(#floorGrad)"/>
  <!-- floor line -->
  <line x1="0" y1="320" x2="800" y2="320" stroke="#94a3b8" stroke-width="1"/>

  <!-- window with blinds (top-left) -->
  <g transform="translate(40,30)">
    <rect width="180" height="140" fill="#dbeafe" stroke="#cbd5e1" stroke-width="2" rx="4"/>
    <!-- blinds -->
    <g stroke="#94a3b8" stroke-width="1.5" opacity="0.55">
      <line x1="0" y1="22" x2="180" y2="22"/>
      <line x1="0" y1="42" x2="180" y2="42"/>
      <line x1="0" y1="62" x2="180" y2="62"/>
      <line x1="0" y1="82" x2="180" y2="82"/>
      <line x1="0" y1="102" x2="180" y2="102"/>
      <line x1="0" y1="122" x2="180" y2="122"/>
    </g>
    <!-- window frame -->
    <rect width="180" height="140" fill="none" stroke="#64748b" stroke-width="3" rx="4"/>
  </g>

  <!-- light beam streaming in -->
  <polygon points="220,170 360,170 480,420 280,420" fill="url(#sunBeam)" opacity="0.7"/>

  <!-- desk -->
  <g filter="url(#softShadow)">
    <!-- desk top -->
    <rect x="190" y="280" width="500" height="20" fill="url(#deskTop)" rx="2"/>
    <!-- desk front -->
    <rect x="190" y="298" width="500" height="14" fill="#713f12"/>
    <!-- desk legs -->
    <rect x="200" y="298" width="14" height="80" fill="url(#desk)"/>
    <rect x="666" y="298" width="14" height="80" fill="url(#desk)"/>
    <!-- side drawer -->
    <rect x="540" y="298" width="120" height="80" fill="#a16207"/>
    <rect x="555" y="320" width="92" height="14" fill="#713f12" rx="2"/>
    <rect x="555" y="350" width="92" height="14" fill="#713f12" rx="2"/>
    <circle cx="600" cy="327" r="2" fill="#fcd34d"/>
    <circle cx="600" cy="357" r="2" fill="#fcd34d"/>
  </g>

  <!-- empty chair (pushed back, slightly turned) -->
  <g filter="url(#softShadow)" transform="translate(330,290) rotate(-12)">
    <!-- chair seat -->
    <rect x="-50" y="0" width="100" height="14" rx="3" fill="url(#chair)"/>
    <!-- chair back -->
    <rect x="-44" y="-90" width="88" height="92" rx="8" fill="url(#chair)"/>
    <!-- chair stem -->
    <rect x="-4" y="14" width="8" height="50" fill="#334155"/>
    <!-- base 5-star -->
    <g fill="#1e293b">
      <ellipse cx="0" cy="68" rx="44" ry="6"/>
      <rect x="-44" y="64" width="14" height="6"/>
      <rect x="-20" y="64" width="14" height="6"/>
      <rect x="6" y="64" width="14" height="6"/>
      <rect x="30" y="64" width="14" height="6"/>
    </g>
    <circle cx="-40" cy="74" r="4" fill="#0f172a"/>
    <circle cx="-13" cy="74" r="4" fill="#0f172a"/>
    <circle cx="13" cy="74" r="4" fill="#0f172a"/>
    <circle cx="40" cy="74" r="4" fill="#0f172a"/>
  </g>

  <!-- scattered papers on desk -->
  <g filter="url(#softShadow)">
    <!-- paper 1 -->
    <g transform="translate(240,260) rotate(-5)">
      <rect width="80" height="100" fill="#f8fafc" stroke="#cbd5e1"/>
      <line x1="10" y1="14" x2="60" y2="14" stroke="#94a3b8" stroke-width="1.5"/>
      <line x1="10" y1="24" x2="68" y2="24" stroke="#94a3b8" stroke-width="1.5"/>
      <line x1="10" y1="34" x2="50" y2="34" stroke="#94a3b8" stroke-width="1.5"/>
      <!-- small diagram -->
      <rect x="12" y="44" width="55" height="40" fill="none" stroke="#94a3b8" stroke-width="1"/>
      <polyline points="14,80 25,68 36,72 47,58 58,62 65,52" fill="none" stroke="#1e40af" stroke-width="1.5"/>
      <circle cx="14" cy="80" r="2" fill="#1e40af"/>
      <circle cx="25" cy="68" r="2" fill="#1e40af"/>
      <circle cx="36" cy="72" r="2" fill="#1e40af"/>
      <circle cx="47" cy="58" r="2" fill="#1e40af"/>
      <circle cx="58" cy="62" r="2" fill="#1e40af"/>
      <circle cx="65" cy="52" r="2" fill="#1e40af"/>
    </g>
    <!-- paper 2 -->
    <g transform="translate(350,255) rotate(8)">
      <rect width="80" height="100" fill="#f8fafc" stroke="#cbd5e1"/>
      <line x1="10" y1="14" x2="62" y2="14" stroke="#94a3b8" stroke-width="1.5"/>
      <line x1="10" y1="24" x2="55" y2="24" stroke="#94a3b8" stroke-width="1.5"/>
      <!-- math hints -->
      <text x="10" y="48" font-family="ui-monospace, monospace" font-size="9" fill="#475569">∇L = ...</text>
      <text x="10" y="64" font-family="ui-monospace, monospace" font-size="9" fill="#475569">Σ wᵢxᵢ</text>
      <text x="10" y="80" font-family="ui-monospace, monospace" font-size="9" fill="#475569">∂y/∂x</text>
    </g>
    <!-- paper 3 -->
    <g transform="translate(460,265) rotate(-3)">
      <rect width="70" height="86" fill="#fefce8" stroke="#d97706" stroke-width="0.8"/>
      <line x1="8" y1="14" x2="54" y2="14" stroke="#a16207" stroke-width="1.2"/>
      <line x1="8" y1="24" x2="46" y2="24" stroke="#a16207" stroke-width="1.2"/>
      <line x1="8" y1="34" x2="58" y2="34" stroke="#a16207" stroke-width="1.2"/>
      <line x1="8" y1="44" x2="40" y2="44" stroke="#a16207" stroke-width="1.2"/>
      <line x1="8" y1="54" x2="52" y2="54" stroke="#a16207" stroke-width="1.2"/>
    </g>
  </g>

  <!-- empty name placard -->
  <g filter="url(#softShadow)" transform="translate(490,250)">
    <!-- triangular stand -->
    <polygon points="0,28 90,28 70,8 20,8" fill="#374151"/>
    <polygon points="20,8 70,8 65,2 25,2" fill="#1f2937"/>
    <!-- empty plate (slot, no name) -->
    <rect x="14" y="10" width="62" height="14" fill="#0f172a" stroke="#374151" stroke-width="1"/>
    <!-- bracket marks showing emptiness -->
    <text x="20" y="22" font-family="ui-monospace, monospace" font-size="11" fill="#475569" font-weight="700">[</text>
    <text x="64" y="22" font-family="ui-monospace, monospace" font-size="11" fill="#475569" font-weight="700">]</text>
  </g>

  <!-- coffee cup half empty -->
  <g filter="url(#softShadow)" transform="translate(580,250)">
    <!-- saucer -->
    <ellipse cx="20" cy="38" rx="30" ry="5" fill="#cbd5e1"/>
    <!-- cup -->
    <path d="M0,12 L40,12 L36,38 L4,38 Z" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <!-- coffee level (half) -->
    <path d="M3,25 L37,25 L36,38 L4,38 Z" fill="#78350f"/>
    <ellipse cx="20" cy="25" rx="17" ry="3" fill="#5c2f0a"/>
    <!-- handle -->
    <path d="M40,18 Q56,18 56,26 Q56,34 40,34" fill="none" stroke="#cbd5e1" stroke-width="3"/>
    <!-- steam-less (cold) -->
  </g>

  <!-- small wall clock hinting time passed -->
  <g transform="translate(720,55)">
    <circle r="28" fill="#fff" stroke="#94a3b8" stroke-width="2"/>
    <line x1="0" y1="0" x2="0" y2="-18" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="14" y2="6" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
    <circle r="2" fill="#1e293b"/>
    <g stroke="#94a3b8" stroke-width="1.5">
      <line x1="0" y1="-22" x2="0" y2="-26"/>
      <line x1="22" y1="0" x2="26" y2="0"/>
      <line x1="0" y1="22" x2="0" y2="26"/>
      <line x1="-22" y1="0" x2="-26" y2="0"/>
    </g>
  </g>
</svg>
