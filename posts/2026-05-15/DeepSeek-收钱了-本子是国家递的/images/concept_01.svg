<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bgGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fef3f2"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <linearGradient id="curtain" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#9f1239"/>
      <stop offset="1" stop-color="#7f1d1d"/>
    </linearGradient>
    <linearGradient id="folder" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#dc2626"/>
      <stop offset="1" stop-color="#991b1b"/>
    </linearGradient>
    <linearGradient id="folderTop" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f87171"/>
      <stop offset="1" stop-color="#dc2626"/>
    </linearGradient>
    <radialGradient id="seal" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#b45309"/>
    </radialGradient>
    <linearGradient id="robotBody" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1e40af"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="800" height="450" fill="url(#bgGrad)"/>

  <!-- floor -->
  <rect y="370" width="800" height="80" fill="#fef2f2" opacity="0.6"/>

  <!-- left red curtain -->
  <path d="M0,0 L240,0 L230,450 L0,450 Z" fill="url(#curtain)"/>
  <path d="M40,0 L40,450" stroke="#7f1d1d" stroke-width="2" opacity="0.5"/>
  <path d="M90,0 L88,450" stroke="#7f1d1d" stroke-width="2" opacity="0.4"/>
  <path d="M140,0 L138,450" stroke="#7f1d1d" stroke-width="2" opacity="0.4"/>
  <path d="M190,0 L188,450" stroke="#7f1d1d" stroke-width="2" opacity="0.3"/>

  <!-- giant arm emerging from curtain -->
  <g filter="url(#shadow)">
    <!-- sleeve -->
    <path d="M210,200 Q260,180 360,200 L380,260 Q300,275 210,255 Z" fill="#1e293b"/>
    <!-- cuff -->
    <rect x="345" y="195" width="35" height="68" fill="#0f172a"/>
    <!-- hand -->
    <ellipse cx="395" cy="230" rx="38" ry="32" fill="#fcd5b4"/>
    <!-- fingers holding folder -->
    <rect x="378" y="218" width="14" height="36" rx="6" fill="#fcd5b4"/>
    <rect x="394" y="214" width="14" height="40" rx="6" fill="#fcd5b4"/>
    <rect x="410" y="218" width="14" height="36" rx="6" fill="#f8b890"/>
  </g>

  <!-- folder being handed -->
  <g filter="url(#shadow)" transform="translate(420,170)">
    <!-- back panel -->
    <rect x="0" y="20" width="180" height="120" rx="6" fill="url(#folder)"/>
    <!-- front panel -->
    <rect x="0" y="40" width="180" height="100" rx="6" fill="url(#folderTop)"/>
    <!-- tab -->
    <path d="M0,40 L40,30 L100,30 L110,40 Z" fill="#b91c1c"/>
    <!-- seal -->
    <circle cx="135" cy="90" r="22" fill="url(#seal)" stroke="#92400e" stroke-width="2"/>
    <path d="M135 76 L139 86 L150 87 L141 94 L144 105 L135 99 L126 105 L129 94 L120 87 L131 86 Z" fill="#92400e"/>
    <!-- lines hinting at text -->
    <rect x="20" y="60" width="80" height="4" rx="2" fill="#fee2e2" opacity="0.7"/>
    <rect x="20" y="74" width="60" height="4" rx="2" fill="#fee2e2" opacity="0.7"/>
    <rect x="20" y="88" width="70" height="4" rx="2" fill="#fee2e2" opacity="0.7"/>
    <rect x="20" y="102" width="50" height="4" rx="2" fill="#fee2e2" opacity="0.7"/>
  </g>

  <!-- chessboard floor with pattern -->
  <g opacity="0.15">
    <rect x="250" y="370" width="550" height="80" fill="#000"/>
    <g fill="#fff">
      <rect x="280" y="380" width="40" height="20"/>
      <rect x="360" y="380" width="40" height="20"/>
      <rect x="440" y="380" width="40" height="20"/>
      <rect x="520" y="380" width="40" height="20"/>
      <rect x="600" y="380" width="40" height="20"/>
      <rect x="680" y="380" width="40" height="20"/>
      <rect x="320" y="410" width="40" height="20"/>
      <rect x="400" y="410" width="40" height="20"/>
      <rect x="480" y="410" width="40" height="20"/>
      <rect x="560" y="410" width="40" height="20"/>
      <rect x="640" y="410" width="40" height="20"/>
    </g>
  </g>

  <!-- small robot receiving on the right -->
  <g filter="url(#shadow)" transform="translate(660,240)">
    <!-- shadow under robot -->
    <ellipse cx="35" cy="138" rx="46" ry="6" fill="#000" opacity="0.15"/>
    <!-- legs -->
    <rect x="20" y="100" width="12" height="34" rx="4" fill="#1e3a8a"/>
    <rect x="40" y="100" width="12" height="34" rx="4" fill="#1e3a8a"/>
    <!-- body -->
    <rect x="6" y="40" width="60" height="68" rx="10" fill="url(#robotBody)"/>
    <!-- chest panel -->
    <rect x="20" y="60" width="32" height="20" rx="3" fill="#0f172a"/>
    <circle cx="28" cy="70" r="3" fill="#22d3ee"/>
    <circle cx="44" cy="70" r="3" fill="#22d3ee"/>
    <!-- arm reaching out -->
    <path d="M6,55 Q-15,45 -25,50 L-20,62 Q-5,62 6,68 Z" fill="#1e40af"/>
    <circle cx="-25" cy="55" r="9" fill="url(#robotBody)"/>
    <!-- head -->
    <rect x="14" y="0" width="44" height="44" rx="10" fill="url(#robotBody)"/>
    <!-- antenna -->
    <line x1="36" y1="0" x2="36" y2="-12" stroke="#1e40af" stroke-width="3" stroke-linecap="round"/>
    <circle cx="36" cy="-14" r="4" fill="#22d3ee"/>
    <!-- eyes -->
    <circle cx="26" cy="20" r="5" fill="#fff"/>
    <circle cx="46" cy="20" r="5" fill="#fff"/>
    <circle cx="26" cy="20" r="2.5" fill="#0f172a"/>
    <circle cx="46" cy="20" r="2.5" fill="#0f172a"/>
    <!-- mouth: small "?" hinting uncertainty -->
    <path d="M30 32 Q36 28 42 32" stroke="#0f172a" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- subtle stage light -->
  <ellipse cx="500" cy="80" rx="220" ry="40" fill="#fff" opacity="0.5"/>
</svg>
