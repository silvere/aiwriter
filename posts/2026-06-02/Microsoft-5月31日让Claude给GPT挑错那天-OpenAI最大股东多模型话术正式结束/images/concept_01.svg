<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="ms" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0078d4"/>
      <stop offset="100%" stop-color="#005a9e"/>
    </linearGradient>
    <linearGradient id="oai" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10a37f"/>
      <stop offset="100%" stop-color="#0d8a6a"/>
    </linearGradient>
    <linearGradient id="anth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cc785c"/>
      <stop offset="100%" stop-color="#a8624b"/>
    </linearGradient>
    <linearGradient id="arrow1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#10a37f"/>
    </linearGradient>
    <linearGradient id="arrow2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10a37f"/>
      <stop offset="100%" stop-color="#cc785c"/>
    </linearGradient>
    <linearGradient id="arrow3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#cc785c"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>

  <!-- Title bar at top -->
  <text x="600" y="50" text-anchor="middle" font-size="20" fill="#0f172a" font-weight="700">Microsoft 365 Copilot · Researcher 智能体</text>
  <text x="600" y="78" text-anchor="middle" font-size="13" fill="#64748b" letter-spacing="2">2026 年 5 月 31 日上线</text>

  <!-- Microsoft platform band (top container) -->
  <rect x="40" y="110" width="1120" height="540" rx="14" fill="#fff" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="40" y="110" width="1120" height="42" rx="14" fill="url(#ms)"/>
  <rect x="40" y="138" width="1120" height="14" fill="url(#ms)"/>
  <text x="65" y="138" fill="#fff" font-size="14" font-weight="700" letter-spacing="1">▦ Microsoft 365 / Agent 365 / Copilot</text>
  <text x="1135" y="138" fill="#bfdbfe" font-size="11" text-anchor="end">控制平面 / Microsoft 自家</text>

  <!-- Step 1: User query -->
  <g transform="translate(80, 260)" filter="url(#shadow)">
    <rect width="180" height="160" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="90" y="32" text-anchor="middle" font-size="11" fill="#64748b" letter-spacing="2">STEP 1</text>
    <circle cx="90" cy="70" r="22" fill="#cbd5e1"/>
    <path d="M 78 68 Q 78 60 90 60 Q 102 60 102 68 M 70 92 Q 70 78 90 78 Q 110 78 110 92" fill="none" stroke="#475569" stroke-width="2.5" stroke-linecap="round"/>
    <text x="90" y="120" text-anchor="middle" font-size="14" fill="#0f172a" font-weight="600">用户提问</text>
    <text x="90" y="142" text-anchor="middle" font-size="11" fill="#64748b">企业用户 / 研究任务</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="266" y1="340" x2="338" y2="340" stroke="url(#arrow1)" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Step 2: GPT (worker) -->
  <g transform="translate(340, 230)" filter="url(#shadow)">
    <rect width="220" height="220" rx="10" fill="#fff" stroke="#10a37f" stroke-width="2"/>
    <rect width="220" height="38" rx="10" fill="url(#oai)"/>
    <rect y="20" width="220" height="18" fill="url(#oai)"/>
    <text x="14" y="25" fill="#fff" font-size="11" font-weight="600" letter-spacing="1">STEP 2 · 生成</text>
    <text x="206" y="25" fill="#a7f3d0" font-size="10" text-anchor="end">OpenAI</text>

    <text x="110" y="80" text-anchor="middle" font-size="22" fill="#0f172a" font-weight="700">GPT</text>
    <text x="110" y="100" text-anchor="middle" font-size="11" fill="#475569" font-style="italic">drafts the response</text>

    <!-- Worker icon: hard hat & wrench-like -->
    <g transform="translate(72, 122)">
      <rect x="0" y="20" width="76" height="48" rx="6" fill="#dcfce7" stroke="#10a37f" stroke-width="1.5"/>
      <text x="38" y="50" text-anchor="middle" font-size="22">🔨</text>
    </g>

    <text x="110" y="200" text-anchor="middle" font-size="11" fill="#10a37f" font-weight="600" letter-spacing="1">— 工人 —</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="566" y1="340" x2="638" y2="340" stroke="url(#arrow2)" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="602" y="328" text-anchor="middle" font-size="11" fill="#64748b">第一稿</text>

  <!-- Step 3: Claude (reviewer) -->
  <g transform="translate(640, 200)" filter="url(#shadow)">
    <rect width="260" height="280" rx="10" fill="#fff" stroke="#cc785c" stroke-width="2.5"/>
    <rect width="260" height="38" rx="10" fill="url(#anth)"/>
    <rect y="20" width="260" height="18" fill="url(#anth)"/>
    <text x="14" y="25" fill="#fff" font-size="11" font-weight="600" letter-spacing="1">STEP 3 · 评估</text>
    <text x="246" y="25" fill="#fed7c8" font-size="10" text-anchor="end">Anthropic</text>

    <text x="130" y="80" text-anchor="middle" font-size="22" fill="#0f172a" font-weight="700">Claude</text>
    <text x="130" y="100" text-anchor="middle" font-size="11" fill="#475569" font-style="italic">reviews accuracy / completeness / citations</text>

    <!-- Checklist of what Claude checks -->
    <g transform="translate(28, 122)" font-size="12" fill="#0f172a">
      <text x="0" y="14">✓ 准确性 (accuracy)</text>
      <text x="0" y="36">✓ 完整性 (completeness)</text>
      <text x="0" y="58">✓ 引用质量 (citation quality)</text>
      <text x="0" y="80">⟲ 否决 / 触发重写</text>
    </g>

    <text x="130" y="260" text-anchor="middle" font-size="11" fill="#cc785c" font-weight="600" letter-spacing="1">— 组长 —</text>
  </g>

  <!-- Arrow 3 -->
  <line x1="906" y1="340" x2="978" y2="340" stroke="url(#arrow3)" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="942" y="328" text-anchor="middle" font-size="11" fill="#64748b">通过</text>

  <!-- Step 4: final answer -->
  <g transform="translate(980, 260)" filter="url(#shadow)">
    <rect width="160" height="160" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="80" y="32" text-anchor="middle" font-size="11" fill="#1d4ed8" letter-spacing="2">STEP 4</text>
    <text x="80" y="70" text-anchor="middle" font-size="34">📄</text>
    <text x="80" y="120" text-anchor="middle" font-size="14" fill="#0f172a" font-weight="600">最终答案</text>
    <text x="80" y="142" text-anchor="middle" font-size="11" fill="#64748b">交付给用户</text>
  </g>

  <!-- Bottom strip: 5 月时间表 -->
  <g transform="translate(80, 530)">
    <text x="0" y="0" font-size="13" fill="#0f172a" font-weight="700">▸ 5 月 30 天，Microsoft 把 OpenAI 从 Copilot 默认位置上挨个挤走</text>
    <g transform="translate(0, 18)">
      <!-- 5/1 -->
      <rect x="0" y="0" width="335" height="80" rx="8" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1.5"/>
      <text x="14" y="22" font-size="13" fill="#0369a1" font-weight="700">5/1 Agent 365 GA</text>
      <text x="14" y="42" font-size="11" fill="#475569">智能体管控层 — Microsoft 自家</text>
      <text x="14" y="60" font-size="11" fill="#64748b">$15 / 用户 / 月 · 管所有家的模型</text>
      <!-- 5/4 -->
      <rect x="350" y="0" width="335" height="80" rx="8" fill="#fef3ec" stroke="#cc785c" stroke-width="1.5"/>
      <text x="364" y="22" font-size="13" fill="#a8624b" font-weight="700">5/4 Excel + PowerPoint</text>
      <text x="364" y="42" font-size="11" fill="#475569">默认模型从 GPT 切换到 Claude</text>
      <text x="364" y="60" font-size="11" fill="#64748b">EU / UK 例外（GDPR 合规）</text>
      <!-- 5/31 -->
      <rect x="700" y="0" width="360" height="80" rx="8" fill="#fef3ec" stroke="#cc785c" stroke-width="2.5"/>
      <text x="714" y="22" font-size="13" fill="#a8624b" font-weight="700">5/31 Researcher 智能体</text>
      <text x="714" y="42" font-size="11" fill="#475569">GPT 写一稿 → Claude 校稿</text>
      <text x="714" y="60" font-size="11" fill="#64748b">"评估"权交给 Anthropic（VP 原话）</text>
    </g>
  </g>

  <!-- Footer caption -->
  <text x="600" y="700" text-anchor="middle" font-size="11" fill="#94a3b8">来源 · GeekWire / TechTimes / Microsoft Learn 官方文档 / Microsoft 365 官方博客（2026-03-09 / 2026-05-04 / 2026-05-31）</text>
</svg>
