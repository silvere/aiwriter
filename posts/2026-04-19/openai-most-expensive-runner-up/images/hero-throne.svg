<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="ghost" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A56DB" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#1A56DB" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="solid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A56DB"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>

  <!-- 地平线 -->
  <line x1="80" y1="500" x2="1120" y2="500" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6,8"/>

  <!-- 大而虚的 OpenAI 圆 -->
  <circle cx="380" cy="340" r="190" fill="url(#ghost)" stroke="#1A56DB" stroke-width="2.5" stroke-dasharray="10,8" opacity="0.85"/>
  <circle cx="380" cy="340" r="120" fill="none" stroke="#1A56DB" stroke-width="1.8" stroke-dasharray="4,6" opacity="0.5"/>
  <text x="380" y="345" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="42" font-weight="800" fill="#1A56DB" opacity="0.55">8520</text>
  <text x="380" y="380" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="600" fill="#1A56DB" opacity="0.6" letter-spacing="2">VALUATION</text>

  <!-- 小但实的 Anthropic 圆 -->
  <circle cx="850" cy="380" r="115" fill="url(#solid)"/>
  <text x="850" y="380" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="36" font-weight="800" fill="#fff">300</text>
  <text x="850" y="410" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="600" fill="#fff" letter-spacing="2" opacity="0.85">REVENUE</text>

  <!-- 飘浮在 Anthropic 上的皇冠 -->
  <g transform="translate(770, 200)">
    <path d="M 0 60 L 20 20 L 40 50 L 80 0 L 120 50 L 140 20 L 160 60 Z" fill="url(#gold)" stroke="#92400e" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="-5" y="60" width="170" height="14" fill="url(#gold)" stroke="#92400e" stroke-width="2"/>
    <circle cx="20" cy="20" r="6" fill="#dc2626"/>
    <circle cx="80" cy="0" r="7" fill="#dc2626"/>
    <circle cx="140" cy="20" r="6" fill="#dc2626"/>
  </g>

  <!-- 飘动光点（暗示皇冠在转移） -->
  <circle cx="500" cy="180" r="4" fill="#fbbf24" opacity="0.7"/>
  <circle cx="600" cy="160" r="3" fill="#fbbf24" opacity="0.6"/>
  <circle cx="700" cy="170" r="5" fill="#fbbf24" opacity="0.85"/>
  <circle cx="640" cy="220" r="2" fill="#fbbf24" opacity="0.5"/>

  <!-- 底部说明条 -->
  <rect x="80" y="540" width="1040" height="32" rx="6" fill="#fff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="600" y="561" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" fill="#475569">估值的桂冠和收入的桂冠，第一次戴在了不同的头上</text>
</svg>
