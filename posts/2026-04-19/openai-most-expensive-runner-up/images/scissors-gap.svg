<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#fef3c7" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="upline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1A56DB"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="downline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1A56DB"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="url(#bg3)"/>

  <text x="600" y="60" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="22" font-weight="700" fill="#1e293b">叙事 vs 事实：剪刀差只会越拉越大</text>

  <!-- 时间轴 -->
  <line x1="120" y1="320" x2="1080" y2="320" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="120" y="345" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#64748b">2025</text>
  <text x="600" y="345" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#64748b">2026 Q2（当下）</text>
  <text x="1080" y="345" text-anchor="end" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#64748b">未来</text>

  <!-- 起点（汇合） -->
  <circle cx="180" cy="320" r="6" fill="#1A56DB"/>
  <text x="180" y="385" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="600" fill="#475569">起点：估值≈收入</text>

  <!-- 上线：叙事/估值 -->
  <path d="M 180 320 Q 500 280, 700 200 T 1060 100" stroke="url(#upline)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <text x="900" y="155" font-family="-apple-system, system-ui, sans-serif" font-size="15" font-weight="700" fill="#dc2626">估值（叙事）</text>
  <text x="900" y="174" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#7f1d1d">8520 亿 → 1万亿？</text>

  <!-- 下线：收入/事实 -->
  <path d="M 180 320 Q 500 360, 700 420 T 1060 480" stroke="url(#downline)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <text x="900" y="510" font-family="-apple-system, system-ui, sans-serif" font-size="15" font-weight="700" fill="#0f766e">收入（事实）</text>
  <text x="900" y="528" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#134e4a">250 亿 → 400 亿？</text>

  <!-- 当下纵轴 -->
  <line x1="600" y1="120" x2="600" y2="450" stroke="#fbbf24" stroke-width="2" stroke-dasharray="6,6"/>
  <circle cx="600" cy="240" r="8" fill="#dc2626" stroke="#fff" stroke-width="3"/>
  <circle cx="600" cy="395" r="8" fill="#0f766e" stroke="#fff" stroke-width="3"/>

  <!-- 当下间隙 -->
  <line x1="540" y1="240" x2="540" y2="395" stroke="#1e293b" stroke-width="1.5" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="525" y="320" text-anchor="end" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e293b">当前剪刀差</text>
  <text x="525" y="338" text-anchor="end" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#475569">≈ 34x P/S 倍数</text>

  <!-- 剪刀符号（在右侧） -->
  <g transform="translate(1080, 290)">
    <circle cx="-25" cy="0" r="14" fill="none" stroke="#dc2626" stroke-width="3"/>
    <circle cx="25" cy="0" r="14" fill="none" stroke="#0f766e" stroke-width="3"/>
    <line x1="-15" y1="-8" x2="20" y2="-50" stroke="#475569" stroke-width="3" stroke-linecap="round"/>
    <line x1="15" y1="-8" x2="-20" y2="-50" stroke="#475569" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- 三种结局标签 -->
  <text x="120" y="555" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="700" fill="#475569">三种结局：</text>
  <text x="220" y="555" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#0f766e">① 收入追上估值（OpenAI 转型成功）</text>
  <text x="600" y="555" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#fbbf24">② AGI 期权兑现</text>
  <text x="820" y="555" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#dc2626">③ 估值砸到收入线</text>
</svg>
