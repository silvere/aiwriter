<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="A quiet corporate desk with an unopened farewell envelope">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f9ff"/>
      <stop offset="100%" stop-color="#EBF5FF"/>
    </linearGradient>
    <linearGradient id="desk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="env" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <radialGradient id="window" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#fef3c7" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fef3c7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- afternoon window light -->
  <ellipse cx="640" cy="120" rx="220" ry="160" fill="url(#window)"/>

  <!-- back wall horizon line -->
  <line x1="0" y1="220" x2="800" y2="220" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4 6"/>

  <!-- desk surface -->
  <path d="M 60 250 L 740 250 L 760 360 L 40 360 Z" fill="url(#desk)" stroke="#93c5fd" stroke-width="1.5"/>

  <!-- monitor (off) -->
  <g transform="translate(150,140)">
    <rect x="0" y="0" width="180" height="110" rx="6" fill="#1e3a8a" stroke="#1A56DB" stroke-width="1.5"/>
    <rect x="6" y="6" width="168" height="98" rx="3" fill="#0f172a"/>
    <rect x="78" y="110" width="24" height="12" fill="#1e3a8a"/>
    <rect x="60" y="122" width="60" height="6" rx="2" fill="#1e3a8a"/>
  </g>

  <!-- chair (back, empty) -->
  <g transform="translate(340,150)" opacity="0.85">
    <rect x="40" y="0" width="80" height="100" rx="10" fill="#cbd5e1" stroke="#94a3b8" stroke-width="1.5"/>
    <rect x="50" y="100" width="60" height="20" fill="#94a3b8"/>
    <line x1="80" y1="120" x2="80" y2="190" stroke="#64748b" stroke-width="3"/>
    <ellipse cx="80" cy="195" rx="40" ry="6" fill="#94a3b8"/>
  </g>

  <!-- coffee mug -->
  <g transform="translate(500,220)">
    <ellipse cx="22" cy="0" rx="22" ry="6" fill="#1A56DB"/>
    <path d="M 0 0 L 4 30 L 40 30 L 44 0 Z" fill="#1A56DB"/>
    <path d="M 44 6 Q 56 6 56 18 Q 56 26 44 26" fill="none" stroke="#1A56DB" stroke-width="3"/>
    <ellipse cx="22" cy="0" rx="18" ry="4" fill="#0f172a"/>
  </g>

  <!-- the farewell envelope (the key prop) -->
  <g transform="translate(380,260) rotate(-6)">
    <rect x="0" y="0" width="200" height="120" rx="4" fill="url(#env)" stroke="#1A56DB" stroke-width="2"/>
    <path d="M 0 0 L 100 70 L 200 0" fill="none" stroke="#1A56DB" stroke-width="2"/>
    <!-- wax seal stand-in -->
    <circle cx="100" cy="90" r="14" fill="#F05252" opacity="0.85"/>
    <circle cx="100" cy="90" r="8" fill="#dc2626"/>
    <!-- subtle "70" pattern, no readable letters per spec, but evocative numerals -->
    <text x="100" y="93" font-family="Georgia, serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">70</text>
  </g>

  <!-- small farewell card -->
  <g transform="translate(140,300) rotate(3)">
    <rect x="0" y="0" width="120" height="70" rx="3" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <line x1="14" y1="20" x2="106" y2="20" stroke="#cbd5e1" stroke-width="1"/>
    <line x1="14" y1="34" x2="106" y2="34" stroke="#cbd5e1" stroke-width="1"/>
    <line x1="14" y1="48" x2="80" y2="48" stroke="#cbd5e1" stroke-width="1"/>
  </g>

  <!-- desk lamp shadow / accent -->
  <ellipse cx="400" cy="358" rx="320" ry="6" fill="#1e3a8a" opacity="0.05"/>

  <!-- subtle date stamp dot -->
  <g transform="translate(680,320)" opacity="0.5">
    <circle cx="0" cy="0" r="22" fill="none" stroke="#F05252" stroke-width="2"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#F05252" stroke-width="2" transform="rotate(8)"/>
  </g>
</svg>
