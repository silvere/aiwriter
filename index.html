<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 前沿观察</title>
  <style>
    :root {
      --brand: #1A56DB;
      --danger: #F05252;
      --text: #1a1a2e;
      --subtext: #4a4a6a;
      --bg: #f8f9ff;
      --card: #ffffff;
      --border: #e2e8f0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB",
                   "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
    }

    /* ── Header ── */
    .site-header {
      background: linear-gradient(135deg, #0f0c29 0%, #1A56DB 60%, #302b63 100%);
      color: #fff;
      padding: 60px 24px 56px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .site-header::before {
      content: '';
      position: absolute; inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .site-logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -0.5px;
      position: relative;
      margin-bottom: 12px;
    }
    .dot {
      width: 10px; height: 10px;
      background: var(--danger);
      border-radius: 50%;
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%       { transform: scale(1.4); opacity: 0.7; }
    }
    .site-tagline { font-size: 15px; opacity: 0.65; position: relative; }

    /* ── Main ── */
    .wrapper { max-width: 860px; margin: 0 auto; padding: 48px 20px 80px; }

    .section-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--brand);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Post card ── */
    .post-list { display: flex; flex-direction: column; gap: 16px; }

    .post-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px 28px;
      display: flex;
      gap: 24px;
      align-items: flex-start;
      text-decoration: none;
      color: inherit;
      transition: box-shadow .18s, transform .18s, border-color .18s;
    }
    .post-card:hover {
      box-shadow: 0 8px 32px rgba(26,86,219,.10);
      transform: translateY(-2px);
      border-color: rgba(26,86,219,.25);
    }
    .post-date-col { flex-shrink: 0; text-align: center; width: 52px; }
    .post-date-day { font-size: 28px; font-weight: 800; color: var(--brand); line-height: 1; }
    .post-date-ym  { font-size: 11px; color: var(--subtext); margin-top: 4px; white-space: nowrap; }
    .post-divider  { width: 1px; background: var(--border); align-self: stretch; flex-shrink: 0; }
    .post-content  { flex: 1; min-width: 0; }
    .post-title {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.5;
      color: var(--text);
      transition: color .15s;
    }
    .post-card:hover .post-title { color: var(--brand); }
    .post-arrow {
      flex-shrink: 0;
      align-self: center;
      color: var(--border);
      font-size: 20px;
      transition: color .15s, transform .15s;
    }
    .post-card:hover .post-arrow { color: var(--brand); transform: translateX(3px); }

    /* ── States ── */
    .state { text-align: center; padding: 60px 20px; color: var(--subtext); }
    .state .icon { font-size: 36px; margin-bottom: 12px; }
    .state p { font-size: 15px; }
    .state code {
      background: #eee; padding: 1px 6px; border-radius: 4px; font-size: 13px;
    }

    /* ── Footer ── */
    .site-footer {
      text-align: center;
      padding: 32px 20px;
      font-size: 13px;
      color: var(--subtext);
      border-top: 1px solid var(--border);
    }

    @media (max-width: 540px) {
      .post-card { padding: 18px 16px; gap: 14px; }
      .post-date-col { width: 40px; }
      .post-date-day { font-size: 22px; }
      .post-divider, .post-arrow { display: none; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="site-logo"><span class="dot"></span>AI 前沿观察</div>
  <p class="site-tagline">深度解读 AI 行业动态，每篇都有独到观点</p>
</header>

<main class="wrapper">
  <div class="section-title">最新文章</div>
  <div class="post-list" id="post-list">
    <div class="state"><div class="icon">⏳</div><p>正在加载文章列表……</p></div>
  </div>
</main>

<footer class="site-footer" id="footer">
  由 <strong>AIWriter</strong> 驱动
</footer>

<script>
// ─── 配置 ──────────────────────────────────────────────────────────────────
// 自动从 GitHub Pages URL 推断 owner/repo；
// 如果使用自定义域名，请手动填写下面两行。
const FALLBACK_OWNER  = 'silvere';
const FALLBACK_REPO   = 'aiwriter';
const BRANCH          = 'main';      // 发布分支
// ───────────────────────────────────────────────────────────────────────────

(async () => {
  const list   = document.getElementById('post-list');
  const footer = document.getElementById('footer');

  // 1. 推断 owner / repo
  let owner = FALLBACK_OWNER, repo = FALLBACK_REPO;
  const host = location.hostname;
  if (host.endsWith('.github.io')) {
    owner = host.replace('.github.io', '');
    const seg = location.pathname.replace(/^\//, '').split('/')[0];
    if (seg) repo = seg;
  }

  // 2. 从 GitHub API 拉取整个文件树（一次请求）
  let tree;
  try {
    const url = `https://api.github.com/repos/${owner}/${repo}/git/trees/${BRANCH}?recursive=1`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`GitHub API ${res.status}: ${res.statusText}`);
    const data = await res.json();
    tree = data.tree ?? [];
  } catch (e) {
    list.innerHTML = `<div class="state">
      <div class="icon">⚠️</div>
      <p>无法从 GitHub API 加载文章列表。<br>
         请确认仓库为公开仓库，或检查网络连接。<br>
         <small style="opacity:.6">${e.message}</small></p>
    </div>`;
    return;
  }

  // 3. 过滤 posts/<date>/<slug>/article.html
  const ARTICLE_RE = /^posts\/(\d{4}-\d{2}-\d{2})\/([^/]+)\/article\.html$/;
  const posts = tree
    .filter(f => f.type === 'blob' && ARTICLE_RE.test(f.path))
    .map(f => {
      const [, date, slug] = f.path.match(ARTICLE_RE);
      return { date, slug, url: f.path };
    })
    .sort((a, b) => b.date.localeCompare(a.date));

  // 4. 渲染
  if (!posts.length) {
    list.innerHTML = `<div class="state"><div class="icon">📭</div>
      <p>posts/ 下暂无文章。</p></div>`;
    return;
  }

  list.innerHTML = posts.map(p => {
    const [year, month, day] = p.date.split('-');
    // slug 标点还原：连字符替换为中文间隔
    const title = p.slug.replace(/-/g, ' ');
    const href  = p.url; // 相对路径，GitHub Pages 会正确解析
    return `
    <a class="post-card" href="${esc(href)}">
      <div class="post-date-col">
        <div class="post-date-day">${esc(day)}</div>
        <div class="post-date-ym">${esc(year)} / ${esc(month)}</div>
      </div>
      <div class="post-divider"></div>
      <div class="post-content">
        <div class="post-title">${esc(title)}</div>
      </div>
      <div class="post-arrow">›</div>
    </a>`;
  }).join('\n');

  footer.innerHTML = `由 <strong>AIWriter</strong> 驱动 &nbsp;·&nbsp; 共 ${posts.length} 篇文章`;

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
})();
</script>

</body>
</html>
