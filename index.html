<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 前沿观察</title>
  <style>
    :root {
      --brand: #1A56DB;
      --danger: #F05252;
      --text: #1a1a2e;
      --subtext: #4a4a6a;
      --bg: #f8f9ff;
      --card: #ffffff;
      --border: #e2e8f0;
      --accent-bg: #EBF5FF;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB",
                   "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
    }

    /* ── HEADER ── */
    .site-header {
      background: linear-gradient(135deg, #0f0c29 0%, #1A56DB 60%, #302b63 100%);
      color: #fff;
      padding: 60px 24px 56px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .site-header::before {
      content: '';
      position: absolute; inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .site-logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -0.5px;
      position: relative;
      margin-bottom: 12px;
    }
    .site-logo .dot {
      width: 10px; height: 10px;
      background: var(--danger);
      border-radius: 50%;
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%       { transform: scale(1.4); opacity: 0.7; }
    }
    .site-tagline {
      font-size: 15px;
      opacity: 0.65;
      position: relative;
    }

    /* ── MAIN ── */
    .wrapper {
      max-width: 860px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }

    /* ── SECTION TITLE ── */
    .section-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--brand);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── POST CARD ── */
    .post-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .post-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px 28px;
      display: flex;
      gap: 24px;
      align-items: flex-start;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.18s, transform 0.18s, border-color 0.18s;
    }
    .post-card:hover {
      box-shadow: 0 8px 32px rgba(26,86,219,0.10);
      transform: translateY(-2px);
      border-color: rgba(26,86,219,0.25);
    }
    .post-date-col {
      flex-shrink: 0;
      text-align: center;
      width: 52px;
    }
    .post-date-day {
      font-size: 28px;
      font-weight: 800;
      color: var(--brand);
      line-height: 1;
    }
    .post-date-ym {
      font-size: 11px;
      color: var(--subtext);
      margin-top: 4px;
      white-space: nowrap;
    }
    .post-divider {
      width: 1px;
      background: var(--border);
      align-self: stretch;
      flex-shrink: 0;
    }
    .post-content {
      flex: 1;
      min-width: 0;
    }
    .post-title {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.5;
      color: var(--text);
      margin-bottom: 8px;
      transition: color 0.15s;
    }
    .post-card:hover .post-title {
      color: var(--brand);
    }
    .post-desc {
      font-size: 14px;
      color: var(--subtext);
      line-height: 1.65;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .post-arrow {
      flex-shrink: 0;
      align-self: center;
      color: var(--border);
      font-size: 20px;
      transition: color 0.15s, transform 0.15s;
    }
    .post-card:hover .post-arrow {
      color: var(--brand);
      transform: translateX(3px);
    }

    /* ── STATES ── */
    .state-box {
      text-align: center;
      padding: 60px 20px;
      color: var(--subtext);
    }
    .state-box .icon { font-size: 40px; margin-bottom: 12px; }
    .state-box p { font-size: 15px; }

    /* ── FOOTER ── */
    .site-footer {
      text-align: center;
      padding: 32px 20px;
      font-size: 13px;
      color: var(--subtext);
      border-top: 1px solid var(--border);
    }

    @media (max-width: 540px) {
      .post-card { padding: 18px 16px; gap: 14px; }
      .post-date-col { width: 40px; }
      .post-date-day { font-size: 22px; }
      .post-divider { display: none; }
      .post-arrow { display: none; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="site-logo">
    <span class="dot"></span>
    AI 前沿观察
  </div>
  <p class="site-tagline">深度解读 AI 行业动态，每篇都有独到观点</p>
</header>

<main class="wrapper">
  <div class="section-title">最新文章</div>
  <div class="post-list" id="post-list">
    <div class="state-box">
      <div class="icon">⏳</div>
      <p>正在加载文章列表……</p>
    </div>
  </div>
</main>

<footer class="site-footer">
  由 <strong>AIWriter</strong> 驱动 · 内容持续更新
</footer>

<script>
(async () => {
  const list = document.getElementById('post-list');

  function renderError(msg) {
    list.innerHTML = `<div class="state-box">
      <div class="icon">📭</div>
      <p>${msg}</p>
    </div>`;
  }

  function formatDate(dateStr) {
    // dateStr: "2026-04-04"
    const parts = dateStr.split('-');
    if (parts.length !== 3) return { day: '--', ym: dateStr };
    return { day: parts[2], ym: `${parts[0]} / ${parts[1]}` };
  }

  let posts;
  try {
    const res = await fetch('posts.json?_=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    posts = await res.json();
  } catch (e) {
    renderError('无法加载文章列表，请先运行 <code>python3 build_index.py</code> 生成 posts.json。');
    return;
  }

  if (!posts.length) {
    renderError('暂无文章，posts/ 目录下还没有内容。');
    return;
  }

  list.innerHTML = posts.map(p => {
    const d = formatDate(p.date);
    const desc = p.description
      ? `<p class="post-desc">${escHtml(p.description)}</p>`
      : '';
    return `
      <a class="post-card" href="${escHtml(p.url)}">
        <div class="post-date-col">
          <div class="post-date-day">${escHtml(d.day)}</div>
          <div class="post-date-ym">${escHtml(d.ym)}</div>
        </div>
        <div class="post-divider"></div>
        <div class="post-content">
          <div class="post-title">${escHtml(p.title)}</div>
          ${desc}
        </div>
        <div class="post-arrow">›</div>
      </a>`;
  }).join('');

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
})();
</script>

</body>
</html>
