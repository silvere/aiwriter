<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <style>
    /* ── 设计令牌 ─────────────────────────────── */
    :root {
      --brand:      #1A56DB;
      --brand-dark: #1240a8;
      --danger:     #F05252;
      --text:       #1a1a2e;
      --subtext:    #4a4a6a;
      --bg:         #f8f9ff;
      --card:       #ffffff;
      --border:     #e2e8f0;
      --accent-bg:  #EBF5FF;
      --radius:     14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC",
                   "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.85;
    }

    /* ── 1. 阅读进度条 ────────────────────────── */
    #progress-bar {
      position: fixed;
      top: 0; left: 0;
      height: 3px;
      width: 0%;
      background: linear-gradient(90deg, var(--brand) 0%, var(--danger) 100%);
      z-index: 999;
      transition: width 80ms linear;
    }

    /* ── 布局 ─────────────────────────────────── */
    .wrapper {
      max-width: 780px;
      margin: 0 auto;
      padding: 0 20px 80px;
    }

    /* ── HERO ─────────────────────────────────── */
    .hero {
      background: linear-gradient(135deg, #0f0c29 0%, #1A56DB 60%, #302b63 100%);
      color: #fff;
      padding: 60px 40px 50px;
      border-radius: 0 0 24px 24px;
      margin-bottom: 40px;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .hero-tag {
      display: inline-block;
      background: rgba(240,82,82,.85);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 18px;
      text-transform: uppercase;
      position: relative;
    }
    .hero h1 {
      font-size: clamp(22px, 4vw, 32px);
      font-weight: 800;
      line-height: 1.35;
      margin-bottom: 20px;
      position: relative;
    }
    .hero-meta {
      font-size: 13px;
      opacity: .7;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      align-items: center;
      position: relative;
    }
    /* 3. 阅读时长 badge */
    .read-time {
      background: rgba(255,255,255,.15);
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 12px;
    }

    /* ── 2. 核心观点卡 ────────────────────────── */
    .key-insights {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 4px solid var(--brand);
      border-radius: 0 var(--radius) var(--radius) 0;
      padding: 24px 28px;
      margin-bottom: 40px;
      box-shadow: 0 2px 16px rgba(26,86,219,.06);
    }
    .key-insights-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--brand);
      margin-bottom: 14px;
    }
    .key-insights-header::before {
      content: '';
      display: inline-block;
      width: 8px; height: 8px;
      background: var(--brand);
      border-radius: 50%;
    }
    .key-insights ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .key-insights li {
      font-size: 15px;
      color: var(--text);
      padding-left: 20px;
      position: relative;
      line-height: 1.6;
    }
    .key-insights li::before {
      content: '›';
      position: absolute;
      left: 0;
      color: var(--brand);
      font-weight: 700;
      font-size: 18px;
      line-height: 1.3;
    }

    /* ── LEAD（导语）─────────────────────────── */
    .lead {
      font-size: 18px;
      color: var(--subtext);
      border-left: 4px solid var(--brand);
      padding: 16px 20px;
      background: var(--accent-bg);
      border-radius: 0 12px 12px 0;
      margin-bottom: 40px;
      line-height: 1.9;
    }

    /* ── 正文 ─────────────────────────────────── */
    .article-body h1 { display: none; }
    .article-body h2 {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      margin: 52px 0 20px;
      padding-bottom: 10px;
      border-bottom: 3px solid var(--brand);
      position: relative;
    }
    .article-body h2::before {
      content: '';
      position: absolute;
      bottom: -3px; left: 0;
      width: 48px; height: 3px;
      background: var(--danger);
    }
    .article-body p { font-size: 16.5px; margin-bottom: 18px; }
    .article-body strong { font-weight: 700; }
    .article-body hr { border: none; border-top: 1px solid var(--border); margin: 40px 0; }
    .article-body ol, .article-body ul { padding-left: 24px; margin: 16px 0 20px; }
    .article-body li { margin-bottom: 8px; font-size: 16.5px; }
    .article-body code {
      background: #f0f4ff;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 14px;
      font-family: "SF Mono", Consolas, monospace;
      color: var(--brand-dark);
    }

    /* 引用块 */
    .article-body blockquote {
      border-left: 4px solid var(--brand);
      background: var(--accent-bg);
      padding: 16px 20px;
      margin: 24px 0;
      border-radius: 0 8px 8px 0;
    }
    .article-body blockquote p {
      margin: 0;
      font-size: 16px;
      font-style: italic;
      color: var(--brand);
      font-weight: 600;
    }

    /* 4. 图片统一样式 */
    .article-body figure,
    figure {
      margin: 32px 0;
      text-align: center;
    }
    .article-body figure img,
    figure img,
    .article-body img {
      max-width: 100%;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.09);
      display: block;
      margin: 0 auto;
    }
    figcaption {
      margin-top: 8px;
      font-size: 12px;
      color: var(--subtext);
    }

    /* ── 数据卡 ───────────────────────────────── */
    .stat-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 32px;
      margin: 32px 0;
      box-shadow: 0 4px 20px rgba(26,86,219,.06);
    }
    .stat-box h3 {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--subtext);
      margin-bottom: 20px;
    }
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 20px;
    }
    .stat-item { text-align: center; }
    .stat-value {
      font-size: 32px;
      font-weight: 800;
      color: var(--danger);
      display: block;
      line-height: 1;
      margin-bottom: 6px;
    }
    .stat-label { font-size: 13px; color: var(--subtext); line-height: 1.4; }

    /* ── Callout（蓝色高亮框）─────────────────── */
    .callout {
      background: linear-gradient(135deg, #1A56DB, #302b63);
      color: #fff;
      border-radius: 16px;
      padding: 28px 32px;
      margin: 36px 0;
    }
    .callout p { font-size: 17px; font-weight: 600; line-height: 1.7; margin: 0; color: #fff; }

    /* ── 警告框 ───────────────────────────────── */
    .warning-box {
      background: #fff5f5;
      border: 1px solid #fed7d7;
      border-left: 4px solid var(--danger);
      border-radius: 0 12px 12px 0;
      padding: 20px 24px;
      margin: 28px 0;
    }
    .warning-box p { margin: 0; color: #c53030; font-weight: 600; }

    /* ── 占位符（写作中临时用）────────────────── */
    .img-placeholder {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 32px 20px;
      margin: 32px 0;
      text-align: center;
      background: var(--card);
    }
    .img-placeholder.concept { border-color: #93c5fd; background: #eff6ff; }
    .img-placeholder.diagram { border-color: #6ee7b7; background: #ecfdf5; }
    .img-placeholder-icon { font-size: 32px; margin-bottom: 8px; }
    .img-placeholder-label { font-size: 13px; color: var(--subtext); margin-bottom: 8px; }
    .img-placeholder details summary {
      font-size: 12px; color: var(--subtext); cursor: pointer;
    }
    .img-placeholder pre {
      font-size: 11px; color: var(--subtext);
      white-space: pre-wrap; text-align: left;
      margin-top: 8px; padding: 10px;
      background: rgba(0,0,0,.04); border-radius: 6px;
    }

    /* ── 5a. 结论高亮卡 ───────────────────────── */
    .conclusion-card {
      background: linear-gradient(135deg, #0f0c29 0%, #1A56DB 100%);
      color: #fff;
      border-radius: 18px;
      padding: 36px 40px;
      margin: 56px 0 40px;
      position: relative;
      overflow: hidden;
    }
    .conclusion-card::before {
      content: '';
      position: absolute; inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .conclusion-card-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: .6;
      margin-bottom: 14px;
      position: relative;
    }
    .conclusion-card p {
      font-size: 17px;
      font-weight: 600;
      line-height: 1.75;
      margin-bottom: 12px;
      color: #fff;
      position: relative;
    }
    .conclusion-card p:last-child { margin-bottom: 0; }

    /* ── 5b. 返回顶部按钮 ─────────────────────── */
    #back-to-top {
      display: none;
      position: fixed;
      bottom: 32px; right: 24px;
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 44px; height: 44px;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(26,86,219,.35);
      transition: opacity .2s, transform .2s;
      z-index: 100;
      line-height: 44px;
      text-align: center;
    }
    #back-to-top:hover { transform: translateY(-3px); }

    /* ── 响应式 ───────────────────────────────── */
    @media (max-width: 600px) {
      .hero { padding: 40px 20px 36px; }
      .hero h1 { font-size: 22px; }
      .key-insights { padding: 18px 18px; }
      .conclusion-card { padding: 28px 22px; }
      .stat-box { padding: 20px 18px; }
    }
  </style>
</head>
<body>

<!-- 1. 阅读进度条 -->
<div id="progress-bar"></div>

<!-- HERO -->
<div class="hero">
  <span class="hero-tag">{{CATEGORY}}</span>
  <h1>{{TITLE}}</h1>
  <div class="hero-meta">
    <span>{{DATE}}</span>
    <!-- 3. 阅读时长（JS 自动计算） -->
    <span class="read-time" id="read-time">计算中…</span>
  </div>
</div>

<div class="wrapper">

  <!-- 2. 核心观点卡 -->
  <div class="key-insights">
    <div class="key-insights-header">核心观点</div>
    <ul>
      <li>{{INSIGHT_1}}</li>
      <li>{{INSIGHT_2}}</li>
      <li>{{INSIGHT_3}}</li>
      <!-- 可选第 4 条 -->
    </ul>
  </div>

  <!-- 导语 -->
  <div class="lead">{{LEAD}}</div>

  <!-- 正文 -->
  <div class="article-body" id="article-body">

    <!-- 各节内容由 AIWriter 生成，示例结构： -->

    <h2>一、节标题</h2>
    <p>正文段落……</p>

    <!-- concept 图占位（fill_images.py 会自动替换为 <figure><img>） -->
    <!--
    <div class="img-placeholder concept">
      <div class="img-placeholder-icon">🎨</div>
      <div class="img-placeholder-label">概念图占位</div>
      <details><summary>生成 Prompt</summary><pre>英文 Prompt 内容</pre></details>
    </div>
    -->

    <!-- diagram 图占位（fill_images.py 解析数据自动生成图表） -->
    <!--
    <div class="img-placeholder diagram">
      <div class="img-placeholder-icon">📊</div>
      <div class="img-placeholder-label">信息图占位</div>
      <details><summary>规格卡</summary><pre>【图类型】：数据图（条形图）
【核心内容】：
  - 标签A：-6%
  - 标签B：-9%
【布局建议】：横向条形图
【配色】：主色 #1A56DB，强调色 #F05252，背景 #FFFFFF</pre></details>
    </div>
    -->

    <!-- 数据卡示例 -->
    <!--
    <div class="stat-box">
      <h3>关键数据</h3>
      <div class="stat-grid">
        <div class="stat-item">
          <span class="stat-value">-6%</span>
          <span class="stat-label">CrowdStrike 单日跌幅</span>
        </div>
      </div>
    </div>
    -->

    <!-- 引用金句示例 -->
    <!--
    <blockquote><p>"这是一段关键引用。"</p></blockquote>
    -->

    <!-- 警告框示例 -->
    <!--
    <div class="warning-box"><p>⚠ 警告内容</p></div>
    -->

    <!-- 蓝色 Callout 示例 -->
    <!--
    <div class="callout"><p>核心判断或金句。</p></div>
    -->

  </div><!-- /article-body -->

  <!-- 5a. 结论高亮卡 -->
  <div class="conclusion-card">
    <div class="conclusion-card-label">结论</div>
    <p>{{CONCLUSION_P1}}</p>
    <p>{{CONCLUSION_P2}}</p>
  </div>

</div><!-- /wrapper -->

<!-- 5b. 返回顶部按钮 -->
<button id="back-to-top" title="返回顶部">↑</button>

<script>
  // 1. 阅读进度条
  const bar = document.getElementById('progress-bar');
  window.addEventListener('scroll', () => {
    const max = document.documentElement.scrollHeight - window.innerHeight;
    bar.style.width = (max > 0 ? window.scrollY / max * 100 : 0) + '%';
  }, { passive: true });

  // 3. 阅读时长（中文约 400 字/分钟）
  const body = document.getElementById('article-body');
  if (body) {
    const chars = body.innerText.replace(/\s/g, '').length;
    const mins  = Math.max(1, Math.round(chars / 400));
    document.getElementById('read-time').textContent = `约 ${mins} 分钟`;
  }

  // 5b. 返回顶部按钮（滚动超过 600px 出现）
  const btn = document.getElementById('back-to-top');
  window.addEventListener('scroll', () => {
    btn.style.display = window.scrollY > 600 ? 'block' : 'none';
  }, { passive: true });
  btn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
</script>

</body>
</html>
